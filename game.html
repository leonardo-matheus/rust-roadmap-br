<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Rust Crab - Aprenda Rust Jogando!</title>
    <meta name="description" content="Aprenda Rust de forma interativa e divertida com exercícios práticos.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="theme-color" content="#F74C00">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rust-primary: #B7410E;
            --rust-light: #CE5A24;
            --ferris-orange: #F74C00;
            --ferris-light: #FF6B2B;
            --bg-dark: #1a1a1a;
            --bg-medium: #242424;
            --bg-light: #2e2e2e;
            --bg-code: #0d0d0d;
            --text-primary: #F5F5F5;
            --text-secondary: #B0B0B0;
            --text-muted: #707070;
            --success: #4EC9B0;
            --error: #F14C4C;
            --warning: #CCA700;
            --info: #3794FF;
            --border: #3a3a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: floatGradient 20s ease-in-out infinite;
        }

        .bg-gradient-1 {
            background: var(--ferris-orange);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-gradient-2 {
            background: var(--rust-primary);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes floatGradient {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, 50px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--ferris-orange);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 15s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.6; }
        }

        /* Page Load Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .animate-delay-4 { animation-delay: 0.4s; opacity: 0; }

        /* Level Transition */
        .level-transition {
            animation: levelChange 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes levelChange {
            0% { opacity: 0; transform: translateX(30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Success Celebration */
        @keyframes celebrate {
            0% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(-2deg); }
            50% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(1.08) rotate(-1deg); }
            100% { transform: scale(1); }
        }

        .celebrating { animation: celebrate 0.5s ease-in-out; }

        /* Header */
        header {
            background: rgba(36, 36, 36, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo span { color: var(--ferris-orange); }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .category-badge {
            background: var(--bg-light);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--ferris-orange);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            width: 150px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rust-primary), var(--ferris-orange));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .level-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .level-text strong { color: var(--ferris-orange); }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Main Layout */
        .game-layout {
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem;
            gap: 1.25rem;
        }

        /* Level Info */
        .level-info {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .level-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.3);
        }

        .level-content {
            flex: 1;
        }

        .level-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .level-objective {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .level-objective code {
            background: var(--bg-code);
            color: var(--ferris-orange);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        /* Teaching Section */
        .teaching-section {
            background: linear-gradient(135deg, var(--bg-medium) 0%, rgba(55, 148, 255, 0.05) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .teaching-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--info), var(--success));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s ease;
        }

        .teaching-section:hover::before {
            transform: scaleX(1);
        }

        .teaching-section:hover {
            border-color: rgba(55, 148, 255, 0.3);
            box-shadow: 0 10px 40px rgba(55, 148, 255, 0.1);
        }

        .teaching-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            color: var(--info);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .teaching-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .teaching-content code {
            background: var(--bg-code);
            color: var(--success);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .teaching-content strong {
            color: var(--text-primary);
        }

        .syntax-example {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--success);
        }

        .syntax-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
            font-family: 'Inter', sans-serif;
        }

        /* Code Editor */
        .code-editor {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .code-editor:hover {
            border-color: rgba(247, 76, 0, 0.3);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4), 0 0 30px rgba(247, 76, 0, 0.1);
        }

        .code-editor:focus-within {
            border-color: var(--ferris-orange);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4), 0 0 40px rgba(247, 76, 0, 0.15);
        }

        .editor-header {
            background: var(--bg-medium);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .editor-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .file-name {
            background: var(--bg-light);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .editor-body {
            padding: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.9;
        }

        .code-line {
            display: flex;
            align-items: center;
            min-height: 1.9em;
        }

        .line-number {
            width: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
            padding-right: 1rem;
            user-select: none;
            flex-shrink: 0;
        }

        .line-content {
            flex: 1;
            white-space: pre-wrap;
        }

        /* Syntax Highlighting */
        .keyword { color: #c678dd; }
        .function { color: #61afef; }
        .string { color: #98c379; }
        .type { color: #e5c07b; }
        .comment { color: #5c6370; font-style: italic; }
        .number { color: #d19a66; }
        .operator { color: #56b6c2; }

        /* Inline Input */
        .inline-input {
            background: rgba(247, 76, 0, 0.1);
            border: 2px solid var(--ferris-orange);
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            min-width: 100px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: inherit;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(247, 76, 0, 0.4); }
            50% { box-shadow: 0 0 20px 3px rgba(247, 76, 0, 0.2); }
        }

        .inline-input:focus {
            background: rgba(247, 76, 0, 0.2);
            box-shadow: 0 0 0 4px rgba(247, 76, 0, 0.2), 0 0 30px rgba(247, 76, 0, 0.3);
            animation: none;
            transform: scale(1.02);
        }

        .inline-input.correct {
            background: rgba(78, 201, 176, 0.2);
            border-color: var(--success);
            animation: successPulse 0.6s ease;
            box-shadow: 0 0 30px rgba(78, 201, 176, 0.4);
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .inline-input.incorrect {
            background: rgba(241, 76, 76, 0.2);
            border-color: var(--error);
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            10% { transform: translateX(-6px) rotate(-1deg); }
            20% { transform: translateX(6px) rotate(1deg); }
            30% { transform: translateX(-6px) rotate(-1deg); }
            40% { transform: translateX(6px) rotate(1deg); }
            50% { transform: translateX(-4px) rotate(0); }
            60% { transform: translateX(4px) rotate(0); }
            70% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
            90% { transform: translateX(-1px); }
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hint-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .hint-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hint-btn:hover:not(:disabled) {
            border-color: var(--warning);
            color: var(--warning);
        }

        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .buttons {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(247, 76, 0, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--ferris-orange);
            color: var(--text-primary);
            background: rgba(247, 76, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Feedback */
        .feedback-section {
            border-radius: 10px;
            padding: 1rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback-section.visible { display: block; }

        .feedback-section.success {
            background: rgba(78, 201, 176, 0.1);
            border: 1px solid rgba(78, 201, 176, 0.3);
        }

        .feedback-section.warning {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
        }

        .feedback-section.error {
            background: rgba(241, 76, 76, 0.1);
            border: 1px solid rgba(241, 76, 76, 0.3);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .feedback-section.success .feedback-header { color: var(--success); }
        .feedback-section.warning .feedback-header { color: var(--warning); }
        .feedback-section.error .feedback-header { color: var(--error); }

        .feedback-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .feedback-text code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hint Display */
        .hint-display {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            color: var(--warning);
            font-size: 0.9rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .hint-display.visible { display: block; }

        .hint-display code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Level Navigation */
        .level-nav {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1.25rem;
            background: var(--bg-medium);
            border-top: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: wrap;
            justify-content: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .level-dot:hover { background: var(--text-muted); transform: scale(1.2); }
        .level-dot.completed { background: var(--success); }
        .level-dot.current {
            background: var(--ferris-orange);
            box-shadow: 0 0 10px rgba(247, 76, 0, 0.5);
            transform: scale(1.3);
        }

        .level-separator {
            width: 2px;
            height: 12px;
            background: var(--text-muted);
            margin: 0 6px;
            opacity: 0.5;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.visible { display: flex; }

        .modal-overlay {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Reset Mode Button */
        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            border-color: var(--ferris-orange);
            color: var(--ferris-orange);
        }

        .mode-indicator {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.25rem 0.5rem;
            background: var(--bg-light);
            border-radius: 4px;
        }

        .mode-indicator.beginner { color: var(--success); }
        .mode-indicator.normal { color: var(--ferris-orange); }

        .modal {
            background: linear-gradient(145deg, var(--bg-medium) 0%, var(--bg-light) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #fff, var(--ferris-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .modal-btn {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

        /* Add space for fixed nav */
        .game-layout { padding-bottom: 80px; }

        /* Responsive */
        @media (max-width: 768px) {

            align-items: center;

            margin-bottom: 2rem;

        .welcome-modal .question {

            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mode-btn {
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .mode-btn:hover::before {
            transform: translateX(100%);
        }

        .mode-btn-beginner {
            background: linear-gradient(135deg, rgba(78, 201, 176, 0.15) 0%, rgba(78, 201, 176, 0.05) 100%);

        .mode-btn-beginner:hover {
            border-color: var(--success);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(78, 201, 176, 0.2);
        }

        .mode-btn-normal {
            background: linear-gradient(135deg, rgba(247, 76, 0, 0.15) 0%, rgba(247, 76, 0, 0.05) 100%);

        .mode-btn-normal:hover {
            border-color: var(--ferris-orange);

            box-shadow: 0 15px 40px rgba(247, 76, 0, 0.2);
        }

        .mode-btn h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            display: flex;

        .mode-btn-beginner h3 { color: var(--success); }

        .mode-btn p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
        }

        /* Level number animation */
        .level-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));

            width: 52px;
            height: 52px;

    <script>
        // Exercícios com progressão MUITO gradual
        const exercises = [
            // === BLOCO 1: Introdução (1-5) ===
            {
                level: 1,
                title: "Olá, Mundo!",
                category: "Introdução",
                objective: "Vamos escrever seu primeiro código em Rust! Digite o texto que será mostrado na tela.",
                teaching: `Em Rust, usamos <code>println!</code> para mostrar mensagens na tela.<br><br>
                    <strong>O que é println!?</strong><br>
                    • <code>println!</code> é uma <strong>macro</strong> (note o <code>!</code> no final)<br>
                    • Ela imprime texto e pula para a próxima linha<br>
                    • O texto deve estar entre <strong>aspas duplas</strong> <code>"texto"</code>`,
                syntax: 'println!("sua mensagem aqui");',
                code: [
                    'fn main() {',
                    '    println!("___");',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'Olá, Rust!',
                correctAnswers: ['Olá, Rust!', 'Ola, Rust!', 'olá, rust!', 'ola, rust!', 'Olá Rust!', 'Ola Rust!', 'Hello, World!', 'hello, world!', 'Hello World!'],
                almostCorrect: [],
                hints: [
                    "Digite qualquer mensagem que você queira mostrar na tela",
                    "Por exemplo: <code>Olá, Rust!</code>",
                    "Apenas digite o texto — as aspas já estão no código!"
                ],
                successMessage: "Perfeito! Você usou <code>println!</code> para mostrar uma mensagem. O <code>!</code> indica que é uma macro, não uma função comum."
            },
            {
                level: 2,
                title: "Criando Variáveis",
                category: "Introdução",
                objective: "Aprenda a criar variáveis para guardar valores.",
                teaching: `Uma <strong>variável</strong> é como uma caixa que guarda um valor.<br><br>
                    Em Rust, criamos variáveis com a palavra-chave <code>let</code>:<br>
                    • <code>let</code> = "deixe" ou "seja" em português<br>
                    • Depois vem o <strong>nome</strong> da variável<br>
                    • O sinal <code>=</code> atribui um valor<br>
                    • No final, sempre colocamos <code>;</code>`,
                syntax: 'let nome = valor;',
                code: [
                    'fn main() {',
                    '    ___ mensagem = "Olá!";',
                    '    println!("{}", mensagem);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'let',
                correctAnswers: ['let'],
                almostCorrect: [
                    { answer: 'Let', feedback: 'Quase! Em Rust, <code>let</code> é sempre minúsculo.' },
                    { answer: 'var', feedback: 'Rust não usa <code>var</code>. A palavra-chave é <code>let</code>.' },
                    { answer: 'const', feedback: '<code>const</code> existe, mas é para constantes. Para variáveis, use <code>let</code>.' }
                ],
                hints: [
                    "Qual palavra em inglês significa 'deixe' ou 'seja'?",
                    "A palavra tem 3 letras: l-e-t",
                    "Digite: <code>let</code>"
                ],
                successMessage: "Excelente! <code>let</code> é a palavra-chave para criar variáveis em Rust."
            },
            {
                level: 3,
                title: "Tipos de Valores",
                category: "Introdução",
                objective: "Entenda os diferentes tipos de valores em Rust.",
                teaching: `Rust tem diferentes <strong>tipos de dados</strong>:<br><br>
                    • <strong>Texto (String):</strong> <code>"Olá"</code> — sempre entre aspas duplas<br>
                    • <strong>Números inteiros:</strong> <code>42</code>, <code>-10</code>, <code>0</code><br>
                    • <strong>Números decimais:</strong> <code>3.14</code>, <code>-2.5</code><br>
                    • <strong>Verdadeiro/Falso:</strong> <code>true</code> ou <code>false</code><br><br>
                    Complete o código criando uma variável com um número:`,
                syntax: 'let idade = 25;',
                code: [
                    'fn main() {',
                    '    let idade = ___;',
                    '    println!("Idade: {}", idade);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '25',
                correctAnswers: ['25', '18', '30', '20', '21', '22', '23', '24', '26', '27', '28', '29', '10', '15', '35', '40'],
                almostCorrect: [
                    { answer: '"25"', feedback: 'Você colocou aspas! Números não precisam de aspas. Digite apenas <code>25</code>.' },
                    { answer: 'vinte', feedback: 'Use o número em formato numérico: <code>25</code>, não por extenso.' }
                ],
                hints: [
                    "Digite um número inteiro, como sua idade",
                    "Números não precisam de aspas — apenas digite o valor",
                    "Por exemplo: <code>25</code>"
                ],
                successMessage: "Ótimo! Você criou uma variável numérica. Note que números não usam aspas!"
            },
            {
                level: 4,
                title: "Texto vs Número",
                category: "Introdução",
                objective: "Pratique a diferença entre texto e números.",
                teaching: `Lembre-se:<br><br>
                    • <strong>Texto:</strong> precisa de aspas duplas <code>"Maria"</code><br>
                    • <strong>Número:</strong> sem aspas <code>25</code><br><br>
                    Crie uma variável com seu nome (texto):`,
                syntax: 'let nome = "seu nome";',
                code: [
                    'fn main() {',
                    '    let nome = ___;',
                    '    println!("Olá, {}!", nome);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '"Maria"',
                correctAnswers: ['"Maria"', '"João"', '"Ana"', '"Carlos"', '"Pedro"', '"Lucas"', '"Julia"', '"Mariana"', '"Rafael"', '"Fernanda"', '"Leonardo"', '"Bruno"', '"Camila"', '"Gabriel"', '"Amanda"'],
                almostCorrect: [
                    { answer: 'Maria', feedback: 'Texto precisa de aspas! Use <code>"Maria"</code> com aspas duplas.' },
                    { answer: "'Maria'", feedback: 'Em Rust, texto usa aspas duplas, não simples. Use <code>"Maria"</code>.' }
                ],
                hints: [
                    "Texto (strings) sempre precisam de aspas duplas",
                    "O formato é: <code>\"seu texto\"</code>",
                    "Digite: <code>\"Maria\"</code> (ou seu nome entre aspas)"
                ],
                successMessage: "Perfeito! Texto sempre usa aspas duplas em Rust. Números ficam sem aspas."
            },
            {
                level: 5,
                title: "Verdadeiro ou Falso",
                category: "Introdução",
                objective: "Aprenda sobre valores booleanos (true/false).",
                teaching: `Valores <strong>booleanos</strong> representam verdadeiro ou falso:<br><br>
                    • <code>true</code> = verdadeiro<br>
                    • <code>false</code> = falso<br><br>
                    <strong>Importante:</strong> sempre em minúsculas e em inglês!<br>
                    São muito usados em condições (se algo é verdade, faça X).`,
                syntax: 'let ativo = true;',
                code: [
                    'fn main() {',
                    '    let esta_chovendo = ___;',
                    '    println!("Está chovendo? {}", esta_chovendo);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'true',
                correctAnswers: ['true', 'false'],
                almostCorrect: [
                    { answer: 'True', feedback: 'Quase! Em Rust é minúsculo: <code>true</code>, não <code>True</code>.' },
                    { answer: 'False', feedback: 'Quase! Em Rust é minúsculo: <code>false</code>, não <code>False</code>.' },
                    { answer: 'verdadeiro', feedback: 'Use o inglês: <code>true</code> ou <code>false</code>.' },
                    { answer: '"true"', feedback: 'Sem aspas! <code>true</code> é um valor especial, não texto.' }
                ],
                hints: [
                    "Booleanos em Rust são: <code>true</code> ou <code>false</code>",
                    "São sempre em inglês e minúsculas",
                    "Digite: <code>true</code> ou <code>false</code>"
                ],
                successMessage: "Ótimo! Booleanos (<code>true</code>/<code>false</code>) são fundamentais para lógica de programação."
            },

            // === BLOCO 2: Variáveis em Profundidade (6-10) ===
            {
                level: 6,
                title: "Variáveis são Imutáveis",
                category: "Variáveis",
                objective: "Entenda que variáveis em Rust não podem mudar por padrão.",
                teaching: `Em Rust, variáveis são <strong>imutáveis por padrão</strong>.<br><br>
                    Isso significa que depois de atribuir um valor, você <strong>não pode mudá-lo</strong>!<br><br>
                    O código abaixo dá <strong>erro</strong>:<br>
                    <code>let x = 5;</code><br>
                    <code>x = 10; // ERRO!</code><br><br>
                    Isso pode parecer estranho, mas ajuda a evitar bugs!`,
                syntax: 'let x = 5; // não pode mudar',
                code: [
                    'fn main() {',
                    '    ___ numero = 10;',
                    '    // numero não pode ser alterado depois!',
                    '    println!("Número: {}", numero);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'let',
                correctAnswers: ['let'],
                almostCorrect: [],
                hints: [
                    "Use a mesma palavra-chave que aprendemos antes",
                    "Começa com 'l' e tem 3 letras",
                    "Digite: <code>let</code>"
                ],
                successMessage: "Correto! Variáveis com <code>let</code> são imutáveis — não podem ser alteradas depois."
            },
            {
                level: 7,
                title: "Variáveis Mutáveis",
                category: "Variáveis",
                objective: "Aprenda a criar variáveis que PODEM ser alteradas.",
                teaching: `Para criar uma variável que <strong>pode mudar</strong>, adicione <code>mut</code>:<br><br>
                    <code>let mut contador = 0;</code><br>
                    <code>contador = 1; // OK!</code><br><br>
                    <code>mut</code> vem de "mutable" (mutável em inglês).<br>
                    Complete o código para permitir que a variável seja alterada:`,
                syntax: 'let mut variavel = valor;',
                code: [
                    'fn main() {',
                    '    let ___ contador = 0;',
                    '    contador = 1;',
                    '    println!("Contador: {}", contador);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'mut',
                correctAnswers: ['mut'],
                almostCorrect: [
                    { answer: 'mutable', feedback: 'Use a abreviação: <code>mut</code>, não <code>mutable</code>.' },
                    { answer: 'var', feedback: 'Em Rust não é <code>var</code>. Use <code>let mut</code> para mutável.' }
                ],
                hints: [
                    "A palavra é abreviação de 'mutable' (mutável)",
                    "Tem 3 letras: m-u-t",
                    "Digite: <code>mut</code>"
                ],
                successMessage: "Excelente! <code>let mut</code> cria variáveis mutáveis que podem ser alteradas."
            },
            {
                level: 8,
                title: "Especificando Tipos",
                category: "Variáveis",
                objective: "Aprenda a declarar o tipo de uma variável explicitamente.",
                teaching: `Rust pode <strong>inferir</strong> tipos automaticamente, mas você pode especificar:<br><br>
                    <code>let idade: i32 = 25;</code><br><br>
                    Tipos comuns de números inteiros:<br>
                    • <code>i32</code> = inteiro de 32 bits (mais usado)<br>
                    • <code>i64</code> = inteiro de 64 bits (números maiores)<br><br>
                    O <code>i</code> significa "integer" (inteiro com sinal, pode ser negativo).`,
                syntax: 'let variavel: tipo = valor;',
                code: [
                    'fn main() {',
                    '    let idade: ___ = 25;',
                    '    println!("Idade: {}", idade);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'i32',
                correctAnswers: ['i32', 'i64', 'i16', 'i8'],
                almostCorrect: [
                    { answer: 'int', feedback: 'Rust não usa <code>int</code>. Use <code>i32</code> para inteiros.' },
                    { answer: 'integer', feedback: 'Use a abreviação: <code>i32</code>, não <code>integer</code>.' },
                    { answer: 'number', feedback: 'Rust usa tipos específicos: <code>i32</code> para inteiros.' }
                ],
                hints: [
                    "O tipo padrão para inteiros é <code>i32</code>",
                    "i = integer (inteiro), 32 = 32 bits",
                    "Digite: <code>i32</code>"
                ],
                successMessage: "Perfeito! <code>i32</code> é um inteiro de 32 bits — o tipo mais comum para números inteiros."
            },
            {
                level: 9,
                title: "Números Decimais",
                category: "Variáveis",
                objective: "Aprenda sobre números com casas decimais (ponto flutuante).",
                teaching: `Para números decimais, usamos tipos de <strong>ponto flutuante</strong>:<br><br>
                    • <code>f64</code> = 64 bits (mais preciso, padrão)<br>
                    • <code>f32</code> = 32 bits (menos preciso)<br><br>
                    O <code>f</code> vem de "float" (flutuante).<br><br>
                    Exemplo: <code>let pi: f64 = 3.14159;</code>`,
                syntax: 'let decimal: f64 = 3.14;',
                code: [
                    'fn main() {',
                    '    let pi: ___ = 3.14159;',
                    '    println!("Pi = {}", pi);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'f64',
                correctAnswers: ['f64', 'f32'],
                almostCorrect: [
                    { answer: 'float', feedback: 'Rust não usa <code>float</code>. Use <code>f64</code>.' },
                    { answer: 'double', feedback: 'Rust não usa <code>double</code>. Use <code>f64</code> (equivalente).' }
                ],
                hints: [
                    "Para decimais, o tipo padrão é <code>f64</code>",
                    "f = float (flutuante), 64 = 64 bits",
                    "Digite: <code>f64</code>"
                ],
                successMessage: "Ótimo! <code>f64</code> é usado para números decimais com alta precisão."
            },
            {
                level: 10,
                title: "Praticando Variáveis",
                category: "Variáveis",
                objective: "Pratique criando uma variável completa.",
                teaching: `Vamos revisar o que aprendemos:<br><br>
                    • <code>let</code> = cria variável imutável<br>

        // Game State
        let currentLevel = 0;
        let completedLevels = new Set();
        let currentHint = 0;
        let streak = 0;
        let hintsUsedTotal = 0;
        let gameMode = null; // 'beginner' ou 'normal'
        let currentExercises = exercises; // Exercícios ativos

        const STORAGE_KEY = 'rustCrabProgress_v3';

        function saveProgress() {
            const state = {
                currentLevel,
                completedLevels: Array.from(completedLevels),
                streak,
                hintsUsedTotal,
                gameMode,
                lastPlayed: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const state = JSON.parse(saved);
                    gameMode = state.gameMode || null;

                    // Define exercícios baseado no modo
                    if (gameMode === 'beginner') {
                        currentExercises = beginnerExercises;
                    } else if (gameMode === 'normal') {
                        currentExercises = exercises;
                    }

                    currentLevel = Math.min(state.currentLevel || 0, currentExercises.length - 1);
                    completedLevels = new Set(state.completedLevels || []);
                    streak = state.streak || 0;
                    hintsUsedTotal = state.hintsUsedTotal || 0;
                }
            } catch (e) {
                console.error('Error loading progress:', e);
            }
        }

        function selectMode(mode) {
            gameMode = mode;

            // Define exercícios baseado no modo
            if (mode === 'beginner') {
                currentExercises = beginnerExercises;
            } else {
                currentExercises = exercises;
            }

            // Reset progresso para novo modo
            currentLevel = 0;
            completedLevels = new Set();
            streak = 0;
            currentHint = 0;

            // Esconde modal com animação
            const modal = document.getElementById('welcomeModal');
            modal.style.opacity = '0';
            modal.style.transform = 'scale(0.95)';

            setTimeout(() => {
                modal.classList.remove('visible');
                modal.style.opacity = '';
                modal.style.transform = '';

                // Inicia o jogo
                renderLevelNav();
                loadLevel(currentLevel);
                updateStats();
                updateModeIndicator();
                saveProgress();

                // Animação de entrada
                document.querySelector('.game-layout').classList.add('level-transition');
            }, 300);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        function init() {
            createParticles();
            loadProgress();

            // Se não tem modo salvo, mostra o welcome modal
            if (!gameMode) {
                document.getElementById('welcomeModal').classList.add('visible');
            } else {
                // Já tem modo, inicia direto
                renderLevelNav();
                loadLevel(currentLevel);
                updateStats();
                updateModeIndicator();
            }

            window.addEventListener('beforeunload', saveProgress);
        }

        function updateStats() {
            document.getElementById('completedCount').textContent = completedLevels.size;
            document.getElementById('streakCount').textContent = streak;
            document.getElementById('totalLevels').textContent = currentExercises.length;
        }

        function renderLevelNav() {
            const nav = document.getElementById('levelNav');
            let html = '';
            let lastCategory = '';

            currentExercises.forEach((ex, index) => {
                if (ex.category !== lastCategory && lastCategory !== '') {
                    html += '<div class="level-separator"></div>';
                }
                lastCategory = ex.category;

                const classes = ['level-dot'];
                if (index === currentLevel) classes.push('current');
                if (completedLevels.has(index)) classes.push('completed');

                html += `<div class="${classes.join(' ')}" onclick="loadLevel(${index})" title="Nível ${index + 1}: ${ex.title}"></div>`;
            });

            nav.innerHTML = html;
        }

        function loadLevel(index) {
            currentLevel = index;
            currentHint = 0;
            const ex = currentExercises[index];

            document.getElementById('levelNumber').textContent = index + 1;
            document.getElementById('levelTitle').textContent = ex.title;
            document.getElementById('categoryBadge').textContent = ex.category;
            document.getElementById('levelObjective').innerHTML = ex.objective;
            document.getElementById('teachingContent').innerHTML = ex.teaching;
            document.getElementById('currentLevelDisplay').textContent = index + 1;
            document.getElementById('progressFill').style.width = ((index + 1) / currentExercises.length * 100) + '%';

            // Syntax example
            if (ex.syntax) {
                document.getElementById('syntaxExample').style.display = 'block';
                document.getElementById('syntaxCode').textContent = ex.syntax;
            } else {
                document.getElementById('syntaxExample').style.display = 'none';
            }

            // Build code editor with inline input
            const editorBody = document.getElementById('editorBody');
            let html = '';

            ex.code.forEach((line, lineIndex) => {
                const lineNum = lineIndex + 1;
                let lineContent = line;

                // Apply syntax highlighting
                lineContent = highlightSyntax(lineContent);

                // Replace ___ with inline input on the designated line
                if (lineIndex === ex.inputLine) {
                    lineContent = lineContent.replace('___',
                        `<input type="text" class="inline-input" id="codeInput" placeholder="${ex.inputPlaceholder}" autocomplete="off" spellcheck="false">`
                    );
                }

                html += `<div class="code-line"><span class="line-number">${lineNum}</span><span class="line-content">${lineContent}</span></div>`;
            });

            editorBody.innerHTML = html;

            // Focus on input and add enter key listener
            const input = document.getElementById('codeInput');
            if (input) {
                input.focus();
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAnswer();
                });
            }

            // Reset hints
            document.getElementById('hintDisplay').classList.remove('visible');
            document.getElementById('hintCounter').textContent = '1/3';
            document.getElementById('hintBtn').disabled = false;

            // Reset feedback
            document.getElementById('feedbackSection').classList.remove('visible', 'success', 'warning', 'error');

            renderLevelNav();
            saveProgress();
        }

        function highlightSyntax(code) {
            // Usar placeholders para evitar conflitos entre regexes
            const placeholders = [];
            let result = code;

            // 1. Primeiro, proteger strings (para não interferir com HTML depois)
            result = result.replace(/"([^"]*)"/g, (match) => {
                const id = `__STR${placeholders.length}__`;
                placeholders.push({ id, html: `<span class="string">${match}</span>` });
                return id;
            });

            // 2. Proteger comentários
            result = result.replace(/\/\/([^\n]*)/g, (match) => {
                const id = `__CMT${placeholders.length}__`;
                placeholders.push({ id, html: `<span class="comment">${match}</span>` });
                return id;
            });

            // 3. Aplicar highlighting de keywords, types, functions, numbers
            result = result
                .replace(/\b(fn|let|mut|if|else|match|for|while|loop|return|struct|enum|impl|use|in)\b/g, '<span class="keyword">$1</span>')
                .replace(/\b(String|i32|i64|u32|f64|f32|bool|char)\b/g, '<span class="type">$1</span>')
                .replace(/\b(println|print|format|vec)\b!/g, '<span class="function">$1</span>!')
                .replace(/\b(\d+)\b/g, '<span class="number">$1</span>');

            // 4. Restaurar placeholders
            placeholders.forEach(p => {
                result = result.replace(p.id, p.html);
            });

            return result;
        }

        function showNextHint() {
            const ex = currentExercises[currentLevel];
            if (currentHint < 3 && ex.hints[currentHint]) {
                const hintDisplay = document.getElementById('hintDisplay');
                hintDisplay.innerHTML = `<strong>Dica ${currentHint + 1}:</strong> ${ex.hints[currentHint]}`;
                hintDisplay.classList.add('visible');

                currentHint++;
                document.getElementById('hintCounter').textContent = `${Math.min(currentHint + 1, 3)}/3`;

                if (currentHint >= 3) {
                    document.getElementById('hintBtn').disabled = true;
                }

                hintsUsedTotal++;
                saveProgress();
            }
        }

        function checkAnswer() {
            const input = document.getElementById('codeInput');
            if (!input) return;

            const ex = currentExercises[currentLevel];
            const userAnswer = input.value.trim();
            const feedbackSection = document.getElementById('feedbackSection');

            // Check for exact match
            const isCorrect = ex.correctAnswers.some(ans =>
                userAnswer === ans ||
                userAnswer.toLowerCase() === ans.toLowerCase()
            );

            // Check for almost correct answers
            let almostMatch = null;
            if (!isCorrect && ex.almostCorrect) {
                almostMatch = ex.almostCorrect.find(item =>
                    userAnswer.toLowerCase() === item.answer.toLowerCase()
                );
            }

            // Check for semicolon tolerance
            let missingSemicolon = false;
            if (!isCorrect && !almostMatch) {
                const withSemicolon = userAnswer + ';';
                const withoutSemicolon = userAnswer.replace(/;$/, '');

                if (ex.correctAnswers.some(ans => withSemicolon === ans || withoutSemicolon === ans)) {
                    missingSemicolon = true;
                }
            }

            feedbackSection.classList.remove('success', 'warning', 'error');
            feedbackSection.classList.add('visible');

            if (isCorrect || missingSemicolon) {
                input.classList.remove('incorrect');
                input.classList.add('correct');

                if (missingSemicolon) {
                    // Accept but warn
                    feedbackSection.classList.add('warning');
                    document.getElementById('feedbackIcon').textContent = '⚠️';
                    document.getElementById('feedbackTitle').textContent = 'Quase perfeito!';
                    document.getElementById('feedbackText').innerHTML = 'Sua resposta está correta! Na prática, lembre-se que <code>;</code> é importante no final de statements em Rust.';
                } else {
                    feedbackSection.classList.add('success');
                    document.getElementById('feedbackIcon').textContent = '✓';
                    document.getElementById('feedbackTitle').textContent = 'Correto! 🦀';
                    document.getElementById('feedbackText').innerHTML = ex.successMessage;
                }

                if (!completedLevels.has(currentLevel)) {
                    completedLevels.add(currentLevel);
                    streak++;
                }
                updateStats();
                renderLevelNav();
                saveProgress();

                setTimeout(() => {
                    showSuccessModal();
                }, 1500);

            } else if (almostMatch) {
                input.classList.add('incorrect');
                feedbackSection.classList.add('warning');
                document.getElementById('feedbackIcon').textContent = '💡';
                document.getElementById('feedbackTitle').textContent = 'Quase lá!';
                document.getElementById('feedbackText').innerHTML = almostMatch.feedback;

                setTimeout(() => input.classList.remove('incorrect'), 400);

            } else {
                input.classList.add('incorrect');
                feedbackSection.classList.add('error');
                document.getElementById('feedbackIcon').textContent = '✗';
                document.getElementById('feedbackTitle').textContent = 'Tente novamente';
                document.getElementById('feedbackText').innerHTML = 'Sua resposta não está correta. Use as dicas se precisar de ajuda!';

                setTimeout(() => input.classList.remove('incorrect'), 400);
            }
        }

        function showSuccessModal() {
            const ex = currentExercises[currentLevel];

            if (currentLevel < currentExercises.length - 1) {
                document.getElementById('modalIcon').textContent = '🎉';
                document.getElementById('modalTitle').textContent = 'Nível Completo!';
                document.getElementById('modalText').textContent = `Você dominou: ${ex.title}`;
            } else {
                document.getElementById('modalIcon').textContent = '🏆';
                document.getElementById('modalTitle').textContent = 'Você é um Rustacean!';
                document.getElementById('modalText').textContent = `Completou todos os ${currentExercises.length} níveis!`;
            }

            document.getElementById('successModal').classList.add('visible');
        }

        function nextLevel() {
            document.getElementById('successModal').classList.remove('visible');
            if (currentLevel < currentExercises.length - 1) {
                loadLevel(currentLevel + 1);
            }
        }

        function resetLevel() {
            loadLevel(currentLevel);
        }

        function resetMode() {
            if (confirm('Deseja trocar de modo? Seu progresso atual será perdido.')) {
                gameMode = null;
                currentLevel = 0;
                completedLevels = new Set();
                streak = 0;
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('welcomeModal').classList.add('visible');
            }
        }

        function updateModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            if (gameMode === 'beginner') {
                indicator.textContent = '🌱 Iniciante';
                indicator.className = 'mode-indicator beginner';
            } else if (gameMode === 'normal') {
                indicator.textContent = '💻 Normal';
                indicator.className = 'mode-indicator normal';
            }
        }

        init();
    </script>
</body>
</html>
