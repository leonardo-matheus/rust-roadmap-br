<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Rust Crab - Aprenda Rust Jogando!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rust-primary: #B7410E;
            --rust-light: #CE5A24;
            --ferris-orange: #F74C00;
            --ferris-light: #FF6B2B;
            --bg-dark: #1a1a1a;
            --bg-medium: #242424;
            --bg-light: #2e2e2e;
            --bg-code: #0d0d0d;
            --text-primary: #F5F5F5;
            --text-secondary: #B0B0B0;
            --text-muted: #707070;
            --success: #4EC9B0;
            --error: #F14C4C;
            --warning: #CCA700;
            --info: #3794FF;
            --border: #3a3a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: var(--bg-medium);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo span { color: var(--ferris-orange); }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .category-badge {
            background: var(--bg-light);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--ferris-orange);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            width: 150px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rust-primary), var(--ferris-orange));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .level-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .level-text strong { color: var(--ferris-orange); }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Main Layout */
        .game-layout {
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem;
            gap: 1.25rem;
        }

        /* Level Info */
        .level-info {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .level-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.3);
        }

        .level-content {
            flex: 1;
        }

        .level-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .level-objective {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .level-objective code {
            background: var(--bg-code);
            color: var(--ferris-orange);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        /* Teaching Section */
        .teaching-section {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
        }

        .teaching-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            color: var(--info);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .teaching-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .teaching-content code {
            background: var(--bg-code);
            color: var(--success);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .teaching-content strong {
            color: var(--text-primary);
        }

        .syntax-example {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--success);
        }

        .syntax-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
            font-family: 'Inter', sans-serif;
        }

        /* Code Editor */
        .code-editor {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .editor-header {
            background: var(--bg-medium);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .editor-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .file-name {
            background: var(--bg-light);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .editor-body {
            padding: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.9;
        }

        .code-line {
            display: flex;
            align-items: center;
            min-height: 1.9em;
        }

        .line-number {
            width: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
            padding-right: 1rem;
            user-select: none;
            flex-shrink: 0;
        }

        .line-content {
            flex: 1;
            white-space: pre-wrap;
        }

        /* Syntax Highlighting */
        .keyword { color: #c678dd; }
        .function { color: #61afef; }
        .string { color: #98c379; }
        .type { color: #e5c07b; }
        .comment { color: #5c6370; font-style: italic; }
        .number { color: #d19a66; }
        .operator { color: #56b6c2; }

        /* Inline Input */
        .inline-input {
            background: rgba(247, 76, 0, 0.15);
            border: 2px solid var(--ferris-orange);
            border-radius: 4px;
            padding: 0.1rem 0.4rem;
            min-width: 80px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .inline-input:focus {
            background: rgba(247, 76, 0, 0.25);
            box-shadow: 0 0 0 3px rgba(247, 76, 0, 0.2);
        }

        .inline-input.correct {
            background: rgba(78, 201, 176, 0.2);
            border-color: var(--success);
        }

        .inline-input.incorrect {
            background: rgba(241, 76, 76, 0.2);
            border-color: var(--error);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hint-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .hint-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hint-btn:hover:not(:disabled) {
            border-color: var(--warning);
            color: var(--warning);
        }

        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .buttons {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(247, 76, 0, 0.3);
        }

        .btn-secondary {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        /* Feedback */
        .feedback-section {
            border-radius: 10px;
            padding: 1rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback-section.visible { display: block; }

        .feedback-section.success {
            background: rgba(78, 201, 176, 0.1);
            border: 1px solid rgba(78, 201, 176, 0.3);
        }

        .feedback-section.warning {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
        }

        .feedback-section.error {
            background: rgba(241, 76, 76, 0.1);
            border: 1px solid rgba(241, 76, 76, 0.3);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .feedback-section.success .feedback-header { color: var(--success); }
        .feedback-section.warning .feedback-header { color: var(--warning); }
        .feedback-section.error .feedback-header { color: var(--error); }

        .feedback-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .feedback-text code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hint Display */
        .hint-display {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            color: var(--warning);
            font-size: 0.9rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .hint-display.visible { display: block; }

        .hint-display code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Level Navigation */
        .level-nav {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1.25rem;
            background: var(--bg-medium);
            border-top: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: wrap;
            justify-content: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .level-dot:hover { background: var(--text-muted); transform: scale(1.2); }
        .level-dot.completed { background: var(--success); }
        .level-dot.current {
            background: var(--ferris-orange);
            box-shadow: 0 0 10px rgba(247, 76, 0, 0.5);
            transform: scale(1.3);
        }

        .level-separator {
            width: 2px;
            height: 12px;
            background: var(--text-muted);
            margin: 0 6px;
            opacity: 0.5;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            max-width: 380px;
            width: 100%;
            animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-icon { font-size: 3rem; margin-bottom: 0.5rem; }

        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .modal-btn {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover { transform: scale(1.05); }

        /* Add space for fixed nav */
        .game-layout { padding-bottom: 80px; }

        /* Responsive */
        @media (max-width: 768px) {
            .progress-section { display: none; }
            .stats { display: none; }
            .game-layout { padding: 1rem; padding-bottom: 70px; }
            .level-info { flex-direction: column; }
            .level-number { width: 40px; height: 40px; font-size: 1rem; }
            .level-title { font-size: 1.2rem; }
            .teaching-section { padding: 1rem; }
            .editor-body { padding: 1rem; font-size: 0.85rem; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .buttons { justify-content: stretch; }
            .btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">🦀 <span>Rust Crab</span></a>
        <div class="progress-section">
            <span class="category-badge" id="categoryBadge">Introdução</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 2%"></div>
            </div>
            <span class="level-text">Nível <strong id="currentLevelDisplay">1</strong>/<strong id="totalLevels">30</strong></span>
        </div>
        <div class="stats">
            <div class="stat">✓ <span id="completedCount">0</span></div>
            <div class="stat">🔥 <span id="streakCount">0</span></div>
        </div>
    </header>

    <main class="game-layout">
        <div class="level-info">
            <div class="level-number" id="levelNumber">1</div>
            <div class="level-content">
                <h1 class="level-title" id="levelTitle">Seu Primeiro Código</h1>
                <p class="level-objective" id="levelObjective">Aprenda a mostrar mensagens na tela.</p>
            </div>
        </div>

        <div class="teaching-section">
            <div class="teaching-header">📖 Aprenda</div>
            <div class="teaching-content" id="teachingContent">
                Conteúdo didático aqui...
            </div>
            <div class="syntax-example" id="syntaxExample" style="display: none;">
                <div class="syntax-label">Sintaxe</div>
                <div id="syntaxCode"></div>
            </div>
        </div>

        <div class="code-editor">
            <div class="editor-header">
                <div class="editor-title">
                    <span>📝</span>
                    <span>Editor</span>
                </div>
                <span class="file-name">main.rs</span>
            </div>
            <div class="editor-body" id="editorBody">
                <!-- Code lines will be inserted here -->
            </div>
        </div>

        <div class="hint-display" id="hintDisplay"></div>

        <div class="feedback-section" id="feedbackSection">
            <div class="feedback-header">
                <span id="feedbackIcon">✓</span>
                <span id="feedbackTitle">Correto!</span>
            </div>
            <div class="feedback-text" id="feedbackText"></div>
        </div>

        <div class="action-bar">
            <div class="hint-section">
                <button class="hint-btn" id="hintBtn" onclick="showNextHint()">
                    💡 Dica <span id="hintCounter">1/3</span>
                </button>
            </div>
            <div class="buttons">
                <button class="btn btn-secondary" onclick="resetLevel()">Limpar</button>
                <button class="btn btn-primary" onclick="checkAnswer()">Verificar ✓</button>
            </div>
        </div>
    </main>

    <div class="level-nav" id="levelNav"></div>

    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 id="modalTitle">Parabéns!</h2>
            <p id="modalText">Você completou o nível!</p>
            <button class="modal-btn" onclick="nextLevel()">Próximo Nível →</button>
        </div>
    </div>

    <script>
        // Exercícios com progressão MUITO gradual
        const exercises = [
            // === BLOCO 1: Introdução (1-5) ===
            {
                level: 1,
                title: "Olá, Mundo!",
                category: "Introdução",
                objective: "Vamos escrever seu primeiro código em Rust! Digite o texto que será mostrado na tela.",
                teaching: `Em Rust, usamos <code>println!</code> para mostrar mensagens na tela.<br><br>
                    <strong>O que é println!?</strong><br>
                    • <code>println!</code> é uma <strong>macro</strong> (note o <code>!</code> no final)<br>
                    • Ela imprime texto e pula para a próxima linha<br>
                    • O texto deve estar entre <strong>aspas duplas</strong> <code>"texto"</code>`,
                syntax: 'println!("sua mensagem aqui");',
                code: [
                    'fn main() {',
                    '    println!("___");',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'Olá, Rust!',
                correctAnswers: ['Olá, Rust!', 'Ola, Rust!', 'olá, rust!', 'ola, rust!', 'Olá Rust!', 'Ola Rust!', 'Hello, World!', 'hello, world!', 'Hello World!'],
                almostCorrect: [],
                hints: [
                    "Digite qualquer mensagem que você queira mostrar na tela",
                    "Por exemplo: <code>Olá, Rust!</code>",
                    "Apenas digite o texto — as aspas já estão no código!"
                ],
                successMessage: "Perfeito! Você usou <code>println!</code> para mostrar uma mensagem. O <code>!</code> indica que é uma macro, não uma função comum."
            },
            {
                level: 2,
                title: "Criando Variáveis",
                category: "Introdução",
                objective: "Aprenda a criar variáveis para guardar valores.",
                teaching: `Uma <strong>variável</strong> é como uma caixa que guarda um valor.<br><br>
                    Em Rust, criamos variáveis com a palavra-chave <code>let</code>:<br>
                    • <code>let</code> = "deixe" ou "seja" em português<br>
                    • Depois vem o <strong>nome</strong> da variável<br>
                    • O sinal <code>=</code> atribui um valor<br>
                    • No final, sempre colocamos <code>;</code>`,
                syntax: 'let nome = valor;',
                code: [
                    'fn main() {',
                    '    ___ mensagem = "Olá!";',
                    '    println!("{}", mensagem);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: 'let',
                correctAnswers: ['let'],
                almostCorrect: [
                    { answer: 'Let', feedback: 'Quase! Em Rust, <code>let</code> é sempre minúsculo.' },
                    { answer: 'var', feedback: 'Rust não usa <code>var</code>. A palavra-chave é <code>let</code>.' },
                    { answer: 'const', feedback: '<code>const</code> existe, mas é para constantes. Para variáveis, use <code>let</code>.' }
                ],
                hints: [
                    "Qual palavra em inglês significa 'deixe' ou 'seja'?",
                    "A palavra tem 3 letras: l-e-t",
                    "Digite: <code>let</code>"
                ],
                successMessage: "Excelente! <code>let</code> é a palavra-chave para criar variáveis em Rust."
            },
            {
                level: 3,
                title: "Tipos de Valores",
                category: "Introdução",
                objective: "Entenda os diferentes tipos de valores em Rust.",
                teaching: `Rust tem diferentes <strong>tipos de dados</strong>:<br><br>
                    • <strong>Texto (String):</strong> <code>"Olá"</code> — sempre entre aspas duplas<br>
                    • <strong>Números inteiros:</strong> <code>42</code>, <code>-10</code>, <code>0</code><br>
                    • <strong>Números decimais:</strong> <code>3.14</code>, <code>-2.5</code><br>
                    • <strong>Verdadeiro/Falso:</strong> <code>true</code> ou <code>false</code><br><br>
                    Complete o código criando uma variável com um número:`,
                syntax: 'let idade = 25;',
                code: [
                    'fn main() {',
                    '    let idade = ___;',
                    '    println!("Idade: {}", idade);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '25',
                correctAnswers: ['25', '18', '30', '20', '21', '22', '23', '24', '26', '27', '28', '29', '10', '15', '35', '40'],
                almostCorrect: [
                    { answer: '"25"', feedback: 'Você colocou aspas! Números não precisam de aspas. Digite apenas <code>25</code>.' },
                    { answer: 'vinte', feedback: 'Use o número em formato numérico: <code>25</code>, não por extenso.' }
                ],
                hints: [

                    <code>if condicao {</code><br>
                    <code>    // código</code><br>
                    <code>}</code>`,
                syntax: 'if condicao {\n    // código\n}',
                code: [
                    'fn main() {',
                    '    let numero = 10;',
                    '    ___ numero > 5 {',
                    '        println!("Maior que 5!");',
                    '    }',
                    '}'
                ],
                inputLine: 2,
                inputPlaceholder: 'if',
                correctAnswers: ['if'],
                almostCorrect: [
                    { answer: 'If', feedback: 'Em Rust, <code>if</code> é minúsculo.' },
                    { answer: 'if(', feedback: 'Em Rust não usamos parênteses! Apenas <code>if</code>.' }
                ],
                hints: [
                    "Qual palavra significa 'se' em inglês?",
                    "Tem 2 letras",
                    "Digite: <code>if</code>"
                ],
                successMessage: "Perfeito! O <code>if</code> executa o bloco porque 10 > 5 é <code>true</code>."
            },
            {
                level: 22,
                title: "If com Else",
                category: "Controle de Fluxo",
                objective: "Adicione um bloco alternativo quando a condição for falsa.",
                teaching: `O <code>else</code> executa quando o <code>if</code> é falso:<br><br>
                    <code>if condicao {</code><br>
                    <code>    // se verdadeiro</code><br>
                    <code>} else {</code><br>
                    <code>    // se falso</code><br>
                    <code>}</code>`,
                syntax: 'if cond { } else { }',
                code: [
                    'fn main() {',
                    '    let idade = 15;',
                    '    if idade >= 18 {',
                    '        println!("Maior de idade");',
                    '    } ___ {',
                    '        println!("Menor de idade");',
                    '    }',
                    '}'
                ],
                inputLine: 4,
                inputPlaceholder: 'else',
                correctAnswers: ['else'],
                almostCorrect: [
                    { answer: 'Else', feedback: 'Em Rust, <code>else</code> é minúsculo.' }
                ],
                hints: [
                    "'Else' significa 'senão' ou 'caso contrário'",
                    "Tem 4 letras",
                    "Digite: <code>else</code>"
                ],
                successMessage: "Ótimo! Como 15 < 18, o bloco <code>else</code> será executado."
            },
            {
                level: 23,
                title: "Match Básico",
                category: "Controle de Fluxo",
                objective: "Aprenda o poderoso pattern matching do Rust!",
                teaching: `<code>match</code> é uma das features mais poderosas do Rust!<br><br>

                    <code>match valor {</code><br>
                    <code>    1 => println!("um"),</code><br>
                    <code>    2 => println!("dois"),</code><br>
                    <code>    _ => println!("outro"),</code><br>
                    <code>}</code><br><br>
                    O <code>_</code> captura "qualquer outro valor".`,
                syntax: 'match valor {\n    padrão => ação,\n}',
                code: [
                    'fn main() {',
                    '    let dia = 1;',
                    '    ___ dia {',
                    '        1 => println!("Segunda"),',
                    '        2 => println!("Terça"),',
                    '        _ => println!("Outro dia"),',
                    '    }',
                    '}'
                ],
                inputLine: 2,
                inputPlaceholder: 'match',
                correctAnswers: ['match'],
                almostCorrect: [
                    { answer: 'switch', feedback: 'Rust não tem <code>switch</code>. Use <code>match</code>.' }
                ],
                hints: [
                    "Rust usa 'match' para pattern matching",
                    "Não é 'switch' como em outras linguagens",
                    "Digite: <code>match</code>"
                ],
                successMessage: "Excelente! <code>match</code> é pattern matching — mais poderoso que switch!"
            },
            {
                level: 24,
                title: "Loop For",
                category: "Controle de Fluxo",

                teaching: `O <code>for</code> em Rust itera sobre sequências:<br><br>
                    <code>for i in 1..4 {</code> → números 1, 2, 3<br>
                    <code>for i in 1..=4 {</code> → números 1, 2, 3, 4<br><br>
                    <code>..</code> é exclusivo (não inclui o último)<br>
                    <code>..=</code> é inclusivo (inclui o último)`,
                syntax: 'for variavel in range { }',
                code: [
                    'fn main() {',
                    '    ___ i in 1..4 {',
                    '        println!("Número: {}", i);',

                    '}'

                inputLine: 1,

                correctAnswers: ['for'],

                ],
                hints: [

                    "Tem 3 letras",

                successMessage: "Perfeito! O loop vai imprimir 1, 2, 3 (o 4 não é incluído em 1..4)."
            },
            {
                level: 25,
                title: "Loop While",
                category: "Controle de Fluxo",
                objective: "Repita enquanto uma condição for verdadeira.",
                teaching: `O <code>while</code> repete enquanto a condição for <code>true</code>:<br><br>
                    <code>while condicao {</code><br>
                    <code>    // código</code><br>
                    <code>}</code><br><br>
                    <strong>Cuidado:</strong> se a condição nunca ficar falsa, o loop é infinito!`,
                syntax: 'while condicao { }',
                code: [
                    'fn main() {',
                    '    let mut n = 3;',
                    '    ___ n > 0 {',
                    '        println!("{}!", n);',
                    '        n = n - 1;',

                    '    println!("Lançar!");',
                    '}'
                ],
                inputLine: 2,
                inputPlaceholder: 'while',
                correctAnswers: ['while'],
                almostCorrect: [],
                hints: [
                    "'While' significa 'enquanto' em inglês",
                    "Tem 5 letras",
                    "Digite: <code>while</code>"
                ],
                successMessage: "Ótimo! Vai imprimir 3!, 2!, 1!, Lançar! — uma contagem regressiva!"
            },

            // === BLOCO 6: Funções (26-30) ===
            {
                level: 26,
                title: "Criando Funções",
                category: "Funções",
                objective: "Aprenda a criar suas próprias funções.",
                teaching: `Funções organizam código em blocos reutilizáveis.<br><br>
                    Em Rust, usamos <code>fn</code> (abreviação de "function"):<br><br>
                    <code>fn nome_da_funcao() {</code><br>
                    <code>    // código</code><br>
                    <code>}</code>`,
                syntax: 'fn nome_funcao() { }',
                code: [
                    '___ saudar() {',
                    '    println!("Olá!");',
                    '}',
                    '',
                    'fn main() {',
                    '    saudar();',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: 'fn',
                correctAnswers: ['fn'],
                almostCorrect: [
                    { answer: 'function', feedback: 'Rust usa <code>fn</code>, não <code>function</code>.' },
                    { answer: 'func', feedback: 'Rust usa <code>fn</code>, não <code>func</code>.' },
                    { answer: 'def', feedback: 'Rust usa <code>fn</code>, não <code>def</code> (Python).' }
                ],
                hints: [
                    "A palavra-chave é abreviação de 'function'",
                    "Tem apenas 2 letras",
                    "Digite: <code>fn</code>"
                ],
                successMessage: "Excelente! <code>fn</code> declara funções em Rust. Curto e direto!"
            },
            {
                level: 27,
                title: "Função com Parâmetro",
                category: "Funções",
                objective: "Passe valores para funções.",
                teaching: `Funções podem receber valores (parâmetros):<br><br>
                    <code>fn saudar(nome: String) {</code><br>
                    <code>    println!("Olá, {}!", nome);</code><br>
                    <code>}</code><br><br>
                    A sintaxe é: <code>nome: Tipo</code> (tipo é obrigatório!)`,
                syntax: 'fn func(param: Tipo) { }',
                code: [
                    'fn saudar(nome___ String) {',
                    '    println!("Olá, {}!", nome);',
                    '}',
                    '',
                    'fn main() {',
                    '    saudar(String::from("Maria"));',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: ':',
                correctAnswers: [':', ': '],
                almostCorrect: [],
                hints: [
                    "Nome e tipo são separados por um caractere",
                    "É dois pontos",
                    "Digite: <code>:</code>"
                ],
                successMessage: "Correto! Em Rust, parâmetros sempre têm tipo: <code>nome: Tipo</code>."
            },
            {
                level: 28,
                title: "Função com Retorno",
                category: "Funções",
                objective: "Faça funções retornarem valores.",
                teaching: `Para retornar um valor, especifique o tipo com <code>-></code>:<br><br>
                    <code>fn dobro(x: i32) -> i32 {</code><br>
                    <code>    x * 2</code><br>
                    <code>}</code><br><br>
                    <strong>Note:</strong> a última expressão sem <code>;</code> é retornada automaticamente!`,
                syntax: 'fn func() -> TipoRetorno { }',
                code: [
                    'fn dobro(x: i32) ___ i32 {',
                    '    x * 2',
                    '}',
                    '',
                    'fn main() {',
                    '    let resultado = dobro(5);',
                    '    println!("Dobro: {}", resultado);',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: '->',
                correctAnswers: ['->', ' ->', '-> ', ' -> '],
                almostCorrect: [
                    { answer: ':', feedback: 'Para tipo de retorno, use <code>-></code>, não <code>:</code>.' }
                ],
                hints: [
                    "O tipo de retorno usa uma 'seta'",
                    "É traço e maior-que",
                    "Digite: <code>-></code>"
                ],
                successMessage: "Perfeito! <code>-></code> indica o tipo de retorno. A função retorna 10 (5 × 2)."
            },
            {
                level: 29,
                title: "Retorno Implícito",
                category: "Funções",
                objective: "Entenda o retorno implícito do Rust.",
                teaching: `Em Rust, a última expressão <strong>sem ponto-e-vírgula</strong> é retornada:<br><br>
                    <code>fn cinco() -> i32 {</code><br>
                    <code>    5  // retorna 5 (sem ;)</code><br>
                    <code>}</code><br><br>
                    Se colocar <code>;</code>, vira "statement" e retorna <code>()</code> (nada)!`,
                syntax: 'fn func() -> i32 {\n    valor // sem ;\n}',
                code: [
                    'fn quadrado(x: i32) -> i32 {',
                    '    x * x___',
                    '}',
                    '',
                    'fn main() {',
                    '    println!("{}", quadrado(4));',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '',
                correctAnswers: ['', ' '],
                almostCorrect: [
                    { answer: ';', feedback: 'Com <code>;</code> o valor não é retornado! Deixe em branco.' }
                ],
                hints: [
                    "Para retorno implícito, NÃO coloque ponto-e-vírgula",
                    "A última expressão sem ; é retornada",
                    "Deixe em branco (não digite nada)"
                ],
                successMessage: "Excelente! Sem <code>;</code>, o valor é retornado automaticamente. Resultado: 16."
            },
            {
                level: 30,
                title: "Parabéns! 🎉",
                category: "Conclusão",
                objective: "Você completou a introdução ao Rust!",
                teaching: `<strong>Você aprendeu os fundamentos do Rust!</strong><br><br>
                    ✅ Variáveis (<code>let</code>, <code>mut</code>)<br>
                    ✅ Tipos (<code>i32</code>, <code>f64</code>, <code>bool</code>, <code>String</code>)<br>
                    ✅ Operadores (+, -, *, /, %, ==, !=, &&, ||)<br>
                    ✅ Controle de fluxo (<code>if</code>, <code>match</code>, <code>for</code>, <code>while</code>)<br>
                    ✅ Funções (<code>fn</code>, parâmetros, retorno)<br><br>
                    <strong>Próximos passos:</strong> Ownership, Borrowing, Structs, Enums...`,
                syntax: 'println!("Parabéns!");',
                code: [
                    'fn main() {',
                    '    let mensagem = "Você é um Rustacean!";',
                    '    println!("___", mensagem);',
                    '}'
                ],
                inputLine: 2,
                inputPlaceholder: '{}',
                correctAnswers: ['{}'],
                almostCorrect: [],
                hints: [
                    "Para interpolar variáveis, usamos chaves vazias",
                    "É o placeholder que aprendemos no início",
                    "Digite: <code>{}</code>"
                ],
                successMessage: "🎉 PARABÉNS! Você completou todos os 30 níveis! Você está pronto para conceitos avançados como Ownership e Borrowing!"
            }
        ];

        // Game State
        let currentLevel = 0;
        let completedLevels = new Set();
        let currentHint = 0;
        let streak = 0;
        let hintsUsedTotal = 0;

        const STORAGE_KEY = 'rustCrabProgress_v2';

        function saveProgress() {
            const state = {
                currentLevel,
                completedLevels: Array.from(completedLevels),
                streak,
                hintsUsedTotal,
                lastPlayed: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const state = JSON.parse(saved);
                    currentLevel = Math.min(state.currentLevel || 0, exercises.length - 1);
                    completedLevels = new Set(state.completedLevels || []);
                    streak = state.streak || 0;
                    hintsUsedTotal = state.hintsUsedTotal || 0;
                }
            } catch (e) {
                console.error('Error loading progress:', e);
            }
        }

        function init() {
            loadProgress();
            renderLevelNav();
            loadLevel(currentLevel);
            updateStats();
            window.addEventListener('beforeunload', saveProgress);
        }

        function updateStats() {
            document.getElementById('completedCount').textContent = completedLevels.size;
            document.getElementById('streakCount').textContent = streak;
            document.getElementById('totalLevels').textContent = exercises.length;
        }

        function renderLevelNav() {
            const nav = document.getElementById('levelNav');
            let html = '';
            let lastCategory = '';

            exercises.forEach((ex, index) => {
                if (ex.category !== lastCategory && lastCategory !== '') {
                    html += '<div class="level-separator"></div>';
                }
                lastCategory = ex.category;

                const classes = ['level-dot'];
                if (index === currentLevel) classes.push('current');
                if (completedLevels.has(index)) classes.push('completed');

                html += `<div class="${classes.join(' ')}" onclick="loadLevel(${index})" title="Nível ${index + 1}: ${ex.title}"></div>`;
            });

            nav.innerHTML = html;
        }

        function loadLevel(index) {
            currentLevel = index;
            currentHint = 0;
            const ex = exercises[index];

            document.getElementById('levelNumber').textContent = index + 1;
            document.getElementById('levelTitle').textContent = ex.title;
            document.getElementById('categoryBadge').textContent = ex.category;
            document.getElementById('levelObjective').innerHTML = ex.objective;
            document.getElementById('teachingContent').innerHTML = ex.teaching;
            document.getElementById('currentLevelDisplay').textContent = index + 1;
            document.getElementById('progressFill').style.width = ((index + 1) / exercises.length * 100) + '%';

            // Syntax example
            if (ex.syntax) {
                document.getElementById('syntaxExample').style.display = 'block';
                document.getElementById('syntaxCode').textContent = ex.syntax;
            } else {
                document.getElementById('syntaxExample').style.display = 'none';
            }

            // Build code editor with inline input
            const editorBody = document.getElementById('editorBody');
            let html = '';

            ex.code.forEach((line, lineIndex) => {
                const lineNum = lineIndex + 1;
                let lineContent = line;

                // Apply syntax highlighting
                lineContent = highlightSyntax(lineContent);

                // Replace ___ with inline input on the designated line
                if (lineIndex === ex.inputLine) {
                    lineContent = lineContent.replace('___',
                        `<input type="text" class="inline-input" id="codeInput" placeholder="${ex.inputPlaceholder}" autocomplete="off" spellcheck="false">`
                    );
                }

                html += `<div class="code-line"><span class="line-number">${lineNum}</span><span class="line-content">${lineContent}</span></div>`;
            });

            editorBody.innerHTML = html;

            // Focus on input and add enter key listener
            const input = document.getElementById('codeInput');
            if (input) {
                input.focus();
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkAnswer();
                });
            }

            // Reset hints
            document.getElementById('hintDisplay').classList.remove('visible');
            document.getElementById('hintCounter').textContent = '1/3';
            document.getElementById('hintBtn').disabled = false;

            // Reset feedback
            document.getElementById('feedbackSection').classList.remove('visible', 'success', 'warning', 'error');

            renderLevelNav();
            saveProgress();
        }

        function highlightSyntax(code) {
            return code
                .replace(/\b(fn|let|mut|if|else|match|for|while|loop|return|struct|enum|impl|use|in)\b/g, '<span class="keyword">$1</span>')
                .replace(/\b(String|i32|i64|u32|f64|f32|bool|char)\b/g, '<span class="type">$1</span>')
                .replace(/\b(println|print|format|vec)\b!/g, '<span class="function">$1</span>!')
                .replace(/(\d+)/g, '<span class="number">$1</span>')
                .replace(/"([^"]*)"/g, '<span class="string">"$1"</span>')
                .replace(/\/\/([^\n]*)/g, '<span class="comment">//$1</span>');
        }

        function showNextHint() {
            const ex = exercises[currentLevel];
            if (currentHint < 3 && ex.hints[currentHint]) {
                const hintDisplay = document.getElementById('hintDisplay');
                hintDisplay.innerHTML = `<strong>Dica ${currentHint + 1}:</strong> ${ex.hints[currentHint]}`;
                hintDisplay.classList.add('visible');

                currentHint++;
                document.getElementById('hintCounter').textContent = `${Math.min(currentHint + 1, 3)}/3`;

                if (currentHint >= 3) {
                    document.getElementById('hintBtn').disabled = true;
                }

                hintsUsedTotal++;
                saveProgress();
            }
        }

        function checkAnswer() {
            const input = document.getElementById('codeInput');
            if (!input) return;

            const ex = exercises[currentLevel];
            const userAnswer = input.value.trim();
            const feedbackSection = document.getElementById('feedbackSection');

            // Check for exact match
            const isCorrect = ex.correctAnswers.some(ans =>
                userAnswer === ans ||
                userAnswer.toLowerCase() === ans.toLowerCase()
            );

            // Check for almost correct answers
            let almostMatch = null;
            if (!isCorrect && ex.almostCorrect) {
                almostMatch = ex.almostCorrect.find(item =>
                    userAnswer.toLowerCase() === item.answer.toLowerCase()
                );
            }

            // Check for semicolon tolerance
            let missingSemicolon = false;
            if (!isCorrect && !almostMatch) {
                const withSemicolon = userAnswer + ';';
                const withoutSemicolon = userAnswer.replace(/;$/, '');

                if (ex.correctAnswers.some(ans => withSemicolon === ans || withoutSemicolon === ans)) {
                    missingSemicolon = true;
                }
            }

            feedbackSection.classList.remove('success', 'warning', 'error');
            feedbackSection.classList.add('visible');

            if (isCorrect || missingSemicolon) {
                input.classList.remove('incorrect');
                input.classList.add('correct');

                if (missingSemicolon) {
                    // Accept but warn
                    feedbackSection.classList.add('warning');
                    document.getElementById('feedbackIcon').textContent = '⚠️';
                    document.getElementById('feedbackTitle').textContent = 'Quase perfeito!';
                    document.getElementById('feedbackText').innerHTML = 'Sua resposta está correta! Na prática, lembre-se que <code>;</code> é importante no final de statements em Rust.';
                } else {
                    feedbackSection.classList.add('success');
                    document.getElementById('feedbackIcon').textContent = '✓';
                    document.getElementById('feedbackTitle').textContent = 'Correto! 🦀';
                    document.getElementById('feedbackText').innerHTML = ex.successMessage;
                }

                if (!completedLevels.has(currentLevel)) {
                    completedLevels.add(currentLevel);
                    streak++;
                }
                updateStats();
                renderLevelNav();
                saveProgress();

                setTimeout(() => {
                    showSuccessModal();
                }, 1500);

            } else if (almostMatch) {
                input.classList.add('incorrect');
                feedbackSection.classList.add('warning');
                document.getElementById('feedbackIcon').textContent = '💡';
                document.getElementById('feedbackTitle').textContent = 'Quase lá!';
                document.getElementById('feedbackText').innerHTML = almostMatch.feedback;

                setTimeout(() => input.classList.remove('incorrect'), 400);

            } else {
                input.classList.add('incorrect');
                feedbackSection.classList.add('error');
                document.getElementById('feedbackIcon').textContent = '✗';
                document.getElementById('feedbackTitle').textContent = 'Tente novamente';
                document.getElementById('feedbackText').innerHTML = 'Sua resposta não está correta. Use as dicas se precisar de ajuda!';

                setTimeout(() => input.classList.remove('incorrect'), 400);
            }
        }

        function showSuccessModal() {
            const ex = exercises[currentLevel];

            if (currentLevel < exercises.length - 1) {
                document.getElementById('modalIcon').textContent = '🎉';
                document.getElementById('modalTitle').textContent = 'Nível Completo!';
                document.getElementById('modalText').textContent = `Você dominou: ${ex.title}`;
            } else {
                document.getElementById('modalIcon').textContent = '🏆';
                document.getElementById('modalTitle').textContent = 'Você é um Rustacean!';
                document.getElementById('modalText').textContent = `Completou todos os ${exercises.length} níveis!`;
            }

            document.getElementById('successModal').classList.add('visible');
        }

        function nextLevel() {
            document.getElementById('successModal').classList.remove('visible');
            if (currentLevel < exercises.length - 1) {
                loadLevel(currentLevel + 1);
            }
        }

        function resetLevel() {
            loadLevel(currentLevel);
        }

        init();
    </script>
