<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Rust Crab - Aprenda Rust Jogando!</title>
    <meta name="description" content="Aprenda Rust de forma interativa e divertida com exercícios práticos.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="theme-color" content="#F74C00">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rust-primary: #B7410E;
            --rust-light: #CE5A24;
            --ferris-orange: #F74C00;
            --ferris-light: #FF6B2B;
            --bg-dark: #1a1a1a;
            --bg-medium: #242424;
            --bg-light: #2e2e2e;
            --bg-code: #0d0d0d;
            --text-primary: #F5F5F5;
            --text-secondary: #B0B0B0;
            --text-muted: #707070;
            --success: #4EC9B0;
            --error: #F14C4C;
            --warning: #CCA700;
            --info: #3794FF;
            --border: #3a3a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: floatGradient 20s ease-in-out infinite;
        }

        .bg-gradient-1 {
            background: var(--ferris-orange);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-gradient-2 {
            background: var(--rust-primary);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes floatGradient {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, 50px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--ferris-orange);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 15s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.6; }
        }

        /* Page Load Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .animate-delay-4 { animation-delay: 0.4s; opacity: 0; }

        /* Level Transition */
        .level-transition {
            animation: levelChange 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes levelChange {
            0% { opacity: 0; transform: translateX(30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Success Celebration */
        @keyframes celebrate {
            0% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(-2deg); }
            50% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(1.08) rotate(-1deg); }
            100% { transform: scale(1); }
        }

        .celebrating { animation: celebrate 0.5s ease-in-out; }

        /* Header */
        header {
            background: rgba(36, 36, 36, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .logo span { color: var(--ferris-orange); }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .category-badge {
            background: var(--bg-light);
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--ferris-orange);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            width: 150px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rust-primary), var(--ferris-orange));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .level-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .level-text strong { color: var(--ferris-orange); }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Main Layout */
        .game-layout {
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem;
            gap: 1.25rem;
        }

        /* Level Info */
        .level-info {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .level-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.3);
        }

        .level-content {
            flex: 1;
        }

        .level-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .level-objective {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .level-objective code {
            background: var(--bg-code);
            color: var(--ferris-orange);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        /* Teaching Section */
        .teaching-section {
            background: linear-gradient(135deg, var(--bg-medium) 0%, rgba(55, 148, 255, 0.05) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            cursor: default;
        }

        .teaching-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--info), var(--success));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.6s ease;
        }

        .teaching-section:hover::before {
            transform: scaleX(1);
        }

        .teaching-section:hover {
            border-color: rgba(55, 148, 255, 0.3);
            box-shadow: 0 10px 40px rgba(55, 148, 255, 0.1);
        }

        .teaching-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            color: var(--info);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .teaching-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .teaching-content code {
            background: var(--bg-code);
            color: var(--success);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .teaching-content strong {
            color: var(--text-primary);
        }

        .syntax-example {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--success);
        }

        .syntax-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
            font-family: 'Inter', sans-serif;
        }

        /* Code Editor */
        .code-editor {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .code-editor:hover {
            border-color: rgba(247, 76, 0, 0.3);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4), 0 0 30px rgba(247, 76, 0, 0.1);
        }

        .code-editor:focus-within {
            border-color: var(--ferris-orange);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4), 0 0 40px rgba(247, 76, 0, 0.15);
        }

        .editor-header {
            background: var(--bg-medium);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .editor-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .file-name {
            background: var(--bg-light);
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .editor-body {
            padding: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.9;
        }

        .code-line {
            display: flex;
            align-items: center;
            min-height: 1.9em;
        }

        .line-number {
            width: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
            padding-right: 1rem;
            user-select: none;
            flex-shrink: 0;
        }

        .line-content {
            flex: 1;
            white-space: pre-wrap;
        }

        /* Syntax Highlighting */
        .keyword { color: #c678dd; }
        .function { color: #61afef; }
        .string { color: #98c379; }
        .type { color: #e5c07b; }
        .comment { color: #5c6370; font-style: italic; }
        .number { color: #d19a66; }
        .operator { color: #56b6c2; }

        /* Inline Input */
        .inline-input {
            background: rgba(247, 76, 0, 0.1);
            border: 2px solid var(--ferris-orange);
            border-radius: 6px;
            padding: 0.15rem 0.5rem;
            min-width: 200px;
            max-width: 100%;
            width: auto;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: inherit;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: pulseGlow 2s ease-in-out infinite;
            field-sizing: content; /* Modern browsers */
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(247, 76, 0, 0.4); }
            50% { box-shadow: 0 0 20px 3px rgba(247, 76, 0, 0.2); }
        }

        .inline-input:focus {
            background: rgba(247, 76, 0, 0.2);
            box-shadow: 0 0 0 4px rgba(247, 76, 0, 0.2), 0 0 30px rgba(247, 76, 0, 0.3);
            animation: none;
            transform: scale(1.02);
        }

        .inline-input.correct {
            background: rgba(78, 201, 176, 0.2);
            border-color: var(--success);
            animation: successPulse 0.6s ease;
            box-shadow: 0 0 30px rgba(78, 201, 176, 0.4);
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .inline-input.incorrect {
            background: rgba(241, 76, 76, 0.2);
            border-color: var(--error);
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            10% { transform: translateX(-6px) rotate(-1deg); }
            20% { transform: translateX(6px) rotate(1deg); }
            30% { transform: translateX(-6px) rotate(-1deg); }
            40% { transform: translateX(6px) rotate(1deg); }
            50% { transform: translateX(-4px) rotate(0); }
            60% { transform: translateX(4px) rotate(0); }
            70% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
            90% { transform: translateX(-1px); }
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .hint-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .hint-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hint-btn:hover:not(:disabled) {
            border-color: var(--warning);
            color: var(--warning);
        }

        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .buttons {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(247, 76, 0, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-secondary {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--ferris-orange);
            color: var(--text-primary);
            background: rgba(247, 76, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Feedback */
        .feedback-section {
            border-radius: 10px;
            padding: 1rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback-section.visible { display: block; }

        .feedback-section.success {
            background: rgba(78, 201, 176, 0.1);
            border: 1px solid rgba(78, 201, 176, 0.3);
        }

        .feedback-section.warning {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
        }

        .feedback-section.error {
            background: rgba(241, 76, 76, 0.1);
            border: 1px solid rgba(241, 76, 76, 0.3);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .feedback-section.success .feedback-header { color: var(--success); }
        .feedback-section.warning .feedback-header { color: var(--warning); }
        .feedback-section.error .feedback-header { color: var(--error); }

        .feedback-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .feedback-text code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hint Display */
        .hint-display {
            background: rgba(204, 167, 0, 0.1);
            border: 1px solid rgba(204, 167, 0, 0.3);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            color: var(--warning);
            font-size: 0.9rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .hint-display.visible { display: block; }

        .hint-display code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Level Navigation */
        .level-nav {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1.25rem;
            background: var(--bg-medium);
            border-top: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: wrap;
            justify-content: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .level-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .level-dot:hover { background: var(--text-muted); transform: scale(1.2); }
        .level-dot.completed { background: var(--success); }
        .level-dot.current {
            background: var(--ferris-orange);
            box-shadow: 0 0 10px rgba(247, 76, 0, 0.5);
            transform: scale(1.3);
        }

        .level-separator {
            width: 2px;
            height: 12px;
            background: var(--text-muted);
            margin: 0 6px;
            opacity: 0.5;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.visible { display: flex; }

        .modal-overlay {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Reset Mode Button */
        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            border-color: var(--ferris-orange);
            color: var(--ferris-orange);
        }

        .mode-indicator {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.25rem 0.5rem;
            background: var(--bg-light);
            border-radius: 4px;
        }

        .mode-indicator.beginner { color: var(--success); }
        .mode-indicator.normal { color: var(--ferris-orange); }

        .modal {
            background: linear-gradient(145deg, var(--bg-medium) 0%, var(--bg-light) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #fff, var(--ferris-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            color: var(--text-secondary);

            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: modalIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);

        .welcome-modal h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .welcome-modal .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .welcome-modal .question {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mode-btn {
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .mode-btn:hover::before {
            transform: translateX(100%);

        .mode-btn-beginner {
            background: linear-gradient(135deg, rgba(78, 201, 176, 0.15) 0%, rgba(78, 201, 176, 0.05) 100%);

        .mode-btn-beginner:hover {
            border-color: var(--success);

        .mode-btn-normal {
            background: linear-gradient(135deg, rgba(247, 76, 0, 0.15) 0%, rgba(247, 76, 0, 0.05) 100%);

        .mode-btn-normal:hover {
            border-color: var(--ferris-orange);

            box-shadow: 0 15px 40px rgba(247, 76, 0, 0.2);

        .mode-btn h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;

        .mode-btn-beginner h3 { color: var(--success); }

        .mode-btn p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
        }

        /* Level number animation */
        .level-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-gradient bg-gradient-1"></div>

    <header>

    <main class="game-layout">

            <div class="level-content">

        <div class="teaching-section" oncontextmenu="return false" oncopy="return false" oncut="return false">
            <div class="teaching-header">📖 Aprenda</div>
            <div class="teaching-content" id="teachingContent">
                Conteúdo didático aqui...
            </div>

                <div class="syntax-label">Sintaxe</div>

            </div>

    <div class="level-nav" id="levelNav"></div>

    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 id="modalTitle">Parabéns!</h2>
            <p id="modalText">Você completou o nível!</p>
            <button class="modal-btn" onclick="nextLevel()">Próximo Nível →</button>
        </div>
    </div>

    <script>
        // MODO AVANÇADO: Exercícios para quem já sabe programar
        // Menos dicas, mais autonomia, complexidade progressiva
        const exercises = [
            // === BLOCO 1: Aquecimento Rápido (1-5) ===
            {
                level: 1,
                title: "Hello Rust",
                category: "Warmup",
                objective: "Imprima qualquer mensagem na tela.",
                teaching: `<code>println!</code> é uma macro (note o <code>!</code>).`,
                syntax: 'println!("texto");',
                code: [
                    'fn main() {',
                    '    ___',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '...',
                correctAnswers: ['println!("Hello");', 'println!("Hello, World!");', 'println!("Olá");', 'println!("Rust");', 'println!("test");', 'println!("Hi");'],
                // Aceita qualquer println! válido
                validationPattern: /^println!\s*\(\s*"[^"]*"\s*\)\s*;?$/,
                almostCorrect: [
                    { answer: 'print("Hello");', feedback: 'Use <code>println!</code> com ! (é uma macro).' },
                    { answer: 'println("Hello");', feedback: 'Faltou o <code>!</code> - é <code>println!</code>' },
                    { almostPattern: /^print\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'Use <code>println!</code> com ! (é uma macro).' },
                    { almostPattern: /^println\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'Faltou o <code>!</code> - é <code>println!</code>' },
                    { almostPattern: /^printf?\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'Em Rust usamos <code>println!</code>, não printf.' },
                    { almostPattern: /^console\.log\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'Isso é JavaScript! Em Rust, use <code>println!</code>' },
                    { almostPattern: /println\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'Isso é Java! Em Rust, use <code>println!</code>' },
                    { almostPattern: /^echo\s+"[^"]*"\s*;?$/, feedback: 'Isso é shell/PHP! Em Rust, use <code>println!</code>' },
                    { almostPattern: /^puts\s+"[^"]*"\s*;?$/, feedback: 'Isso é Ruby! Em Rust, use <code>println!</code>' }
                ],
                hints: [
                    "Sintaxe: println!(\"mensagem\");"
                ],
                successMessage: "Correto! <code>println!</code> é uma macro, não uma função."
            },
            {
                level: 2,
                title: "Declarar Variável",
                category: "Warmup",
                objective: "Declare uma variável com um valor inteiro.",
                teaching: `Variáveis são imutáveis por padrão.`,
                syntax: 'let x = 10;',
                code: [
                    'fn main() {',
                    '    ___',
                    '    println!("{}", valor);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '...',
                correctAnswers: ['let valor = 42;', 'let valor = 10;', 'let valor = 100;', 'let valor = 0;', 'let valor = 1;', 'let valor = 5;'],
                // Aceita let valor = qualquer_numero;
                validationPattern: /^let\s+valor\s*=\s*-?\d+\s*;?$/,
                almostCorrect: [
                    { answer: 'var valor = 42;', feedback: 'Rust usa <code>let</code>, não <code>var</code>.' },
                    { answer: 'int valor = 42;', feedback: 'Rust usa <code>let</code>. Tipos são inferidos ou declarados com <code>:</code>.' },
                    { almostPattern: /^var\s+valor\s*=\s*-?\d+\s*;?$/, feedback: 'Rust usa <code>let</code>, não <code>var</code>.' },
                    { almostPattern: /^int\s+valor\s*=\s*-?\d+\s*;?$/, feedback: 'Rust usa <code>let</code>. Tipos são inferidos ou declarados com <code>:</code>.' },
                    { almostPattern: /^let\s+\w+\s*=\s*-?\d+\s*;?$/, feedback: 'A variável deve se chamar <code>valor</code> para funcionar com o println.' }
                ],
                hints: [
                    "let nome = valor;"
                ],
                successMessage: "Variáveis em Rust são imutáveis por padrão."
            },
            {
                level: 3,
                title: "Variável Mutável",
                category: "Warmup",
                objective: "Declare uma variável que pode ser modificada.",
                teaching: `Use <code>mut</code> para variáveis mutáveis.`,
                syntax: 'let mut x = 0;',
                code: [
                    'fn main() {',
                    '    ___',
                    '    contador += 1;',
                    '    println!("{}", contador);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '...',
                correctAnswers: ['let mut contador = 0;', 'let mut contador = 1;', 'let mut contador = 10;'],
                // Aceita let mut contador = qualquer_numero;
                validationPattern: /^let\s+mut\s+contador\s*=\s*-?\d+\s*;?$/,
                almostCorrect: [
                    { answer: 'let contador = 0;', feedback: 'Faltou <code>mut</code> - a variável precisa ser mutável.' },
                    { almostPattern: /^let\s+contador\s*=\s*-?\d+\s*;?$/, feedback: 'Faltou <code>mut</code> - a variável precisa ser mutável para usar <code>+=</code>.' },
                    { almostPattern: /^var\s+contador\s*=\s*-?\d+\s*;?$/, feedback: 'Rust usa <code>let mut</code>, não <code>var</code>.' }
                ],
                hints: [
                    "let mut nome = valor;"
                ],
                successMessage: "<code>mut</code> permite que a variável seja reatribuída."
            },
            {
                level: 4,
                title: "Tipo Explícito",
                category: "Warmup",
                objective: "Declare uma variável com tipo explícito i32.",
                teaching: `Tipos podem ser especificados após <code>:</code>`,
                syntax: 'let x: i32 = 10;',
                code: [
                    'fn main() {',
                    '    ___',
                    '    println!("{}", numero);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '...',
                correctAnswers: ['let numero: i32 = 100;', 'let numero: i32 = 42;', 'let numero: i32 = 0;', 'let numero: i32 = 10;', 'let numero: i32 = -5;'],
                // Aceita let numero: i32 = qualquer_numero;
                validationPattern: /^let\s+numero\s*:\s*i32\s*=\s*-?\d+\s*;?$/,
                almostCorrect: [
                    { almostPattern: /^let\s+numero\s*=\s*-?\d+\s*;?$/, feedback: 'Faltou especificar o tipo: <code>numero: i32</code>' },
                    { almostPattern: /^let\s+numero\s*:\s*int\s*=\s*-?\d+\s*;?$/, feedback: 'O tipo é <code>i32</code>, não <code>int</code>.' }
                ],
                hints: [
                    "let nome: tipo = valor;"
                ],
                successMessage: "Tipos explícitos ajudam na clareza do código."
            },
            {
                level: 5,
                title: "String vs &str",
                category: "Warmup",
                objective: "Declare uma variável do tipo String.",
                teaching: `<code>String</code> é heap-allocated e mutável. <code>&str</code> é uma referência.`,
                syntax: 'let s = String::from("texto");',
                code: [
                    'fn main() {',
                    '    ___',
                    '    println!("{}", texto);',
                    '}'
                ],
                inputLine: 1,
                inputPlaceholder: '...',
                correctAnswers: ['let texto = String::from("Rust");', 'let texto = String::from("Hello");', 'let texto = String::from("test");', 'let texto: String = String::from("Rust");'],
                // Aceita let texto = String::from("qualquer");
                validationPattern: /^let\s+texto\s*(:\s*String\s*)?=\s*String::from\s*\(\s*"[^"]*"\s*\)\s*;?$/,
                almostCorrect: [
                    { answer: 'let texto = "Rust";', feedback: 'Isso cria um <code>&str</code>. Use <code>String::from()</code> para String.' },
                    { almostPattern: /^let\s+texto\s*=\s*"[^"]*"\s*;?$/, feedback: 'Isso cria um <code>&str</code>. Use <code>String::from("...")</code> para criar uma String.' },
                    { almostPattern: /^let\s+texto\s*=\s*'[^']*'\s*;?$/, feedback: 'Use aspas duplas <code>"..."</code> para strings, não aspas simples.' },
                    { almostPattern: /^let\s+(?!texto)\w+\s*(:\s*String\s*)?=\s*String::from\s*\(\s*"[^"]*"\s*\)\s*;?$/, feedback: 'A variável deve se chamar <code>texto</code> para funcionar com o println abaixo.' },
                    { almostPattern: /^let\s+(?!texto)\w+\s*=\s*"[^"]*"\s*;?$/, feedback: 'A variável deve se chamar <code>texto</code>. E use <code>String::from("...")</code> para criar uma String.' }
                ],
                hints: [
                    "String::from(\"texto\")"
                ],
                successMessage: "<code>String</code> é owned, <code>&str</code> é borrowed."
            },

            // === BLOCO 2: Funções (6-12) ===
            {
                level: 6,
                title: "Função Simples",
                category: "Funções",
                objective: "Crie uma função que não retorna nada.",
                teaching: `Funções são definidas com <code>fn</code>.`,
                syntax: 'fn nome() { }',
                code: [
                    '___',
                    '    println!("Olá!");',
                    '}',
                    '',
                    'fn main() {',
                    '    saudar();',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: '...',
                correctAnswers: ['fn saudar() {'],
                validationPattern: /^fn\s+saudar\s*\(\s*\)\s*\{?$/,
                almostCorrect: [
                    { answer: 'function saudar() {', feedback: 'Rust usa <code>fn</code>, não <code>function</code>.' },
                    { answer: 'def saudar():', feedback: 'Isso é Python. Rust usa <code>fn nome() {</code>.' },
                    { almostPattern: /^function\s+saudar\s*\(\s*\)/, feedback: 'Rust usa <code>fn</code>, não <code>function</code>.' },
                    { almostPattern: /^def\s+saudar\s*\(\s*\)/, feedback: 'Isso é Python! Em Rust, use <code>fn saudar() {</code>' },
                    { almostPattern: /^void\s+saudar\s*\(\s*\)/, feedback: 'Isso é C/C++! Em Rust, use <code>fn saudar() {</code>' }
                ],
                hints: [
                    "fn nome() {"
                ],
                successMessage: "Funções sem retorno implicitamente retornam <code>()</code> (unit type)."
            },
            {
                level: 7,
                title: "Função com Parâmetro",
                category: "Funções",
                objective: "Crie uma função que recebe um i32 como parâmetro.",
                teaching: `Parâmetros precisam de tipo explícito.`,
                syntax: 'fn nome(param: tipo) { }',
                code: [
                    '___',
                    '    println!("Valor: {}", n);',
                    '}',
                    '',
                    'fn main() {',
                    '    mostrar(42);',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: '...',
                correctAnswers: ['fn mostrar(n: i32) {', 'fn mostrar(n:i32) {', 'fn mostrar(n : i32) {'],
                validationPattern: /^fn\s+mostrar\s*\(\s*n\s*:\s*i32\s*\)\s*\{?$/,
                almostCorrect: [
                    { answer: 'fn mostrar(n) {', feedback: 'Parâmetros precisam de tipo: <code>n: i32</code>.' },
                    { almostPattern: /^fn\s+mostrar\s*\(\s*n\s*\)\s*\{?$/, feedback: 'Parâmetros precisam de tipo explícito: <code>n: i32</code>.' },
                    { almostPattern: /^fn\s+mostrar\s*\(\s*int\s+n\s*\)\s*\{?$/, feedback: 'A sintaxe é <code>n: i32</code>, não <code>int n</code>.' }
                ],
                hints: [
                    "fn nome(param: tipo) {"
                ],
                successMessage: "Em Rust, parâmetros sempre precisam de anotação de tipo."
            },
            {
                level: 8,
                title: "Função com Retorno",
                category: "Funções",
                objective: "Crie uma função que retorna um i32.",
                teaching: `Use <code>-> tipo</code> para indicar retorno. Última expressão sem <code>;</code> é o retorno.`,
                syntax: 'fn nome() -> tipo { valor }',
                code: [
                    '___',
                    '    42',
                    '}',
                    '',
                    'fn main() {',
                    '    let x = get_answer();',
                    '    println!("{}", x);',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: '...',
                correctAnswers: ['fn get_answer() -> i32 {', 'fn get_answer()->i32 {', 'fn get_answer() -> i32{'],
                validationPattern: /^fn\s+get_answer\s*\(\s*\)\s*->\s*i32\s*\{?$/,
                almostCorrect: [
                    { answer: 'fn get_answer() {', feedback: 'Faltou o tipo de retorno: <code>-> i32</code>.' },
                    { almostPattern: /^fn\s+get_answer\s*\(\s*\)\s*\{?$/, feedback: 'Faltou o tipo de retorno: <code>-> i32</code>.' },
                    { almostPattern: /^fn\s+get_answer\s*\(\s*\)\s*:\s*i32\s*\{?$/, feedback: 'Use <code>-></code> para tipo de retorno, não <code>:</code>.' }
                ],
                hints: [
                    "-> tipo após os parênteses"
                ],
                successMessage: "A última expressão (sem ;) é retornada automaticamente."
            },
            {
                level: 9,
                title: "Soma de Dois Números",
                category: "Funções",
                objective: "Implemente uma função que soma dois i32.",
                teaching: ``,
                syntax: 'fn soma(a: i32, b: i32) -> i32 { a + b }',
                code: [
                    '___',
                    '',
                    'fn main() {',
                    '    let resultado = soma(5, 3);',
                    '    println!("{}", resultado);',
                    '}'
                ],
                inputLine: 0,
                inputPlaceholder: '...',

        function autoResizeInput() {
            const input = document.getElementById('codeInput');
            if (!input) return;
            // Create a hidden span to measure text width
            const span = document.createElement('span');
            span.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:inherit;font-size:inherit;padding:0.15rem 0.5rem;';
            span.textContent = input.value || input.placeholder || '...';
            document.body.appendChild(span);
            const width = Math.max(200, Math.min(span.offsetWidth + 30, 600));
            input.style.width = width + 'px';
            document.body.removeChild(span);

            // Reset hints
            document.getElementById('hintDisplay').classList.remove('visible');
            document.getElementById('hintCounter').textContent = '1/3';
            document.getElementById('hintBtn').disabled = false;

            // Reset feedback
            document.getElementById('feedbackSection').classList.remove('visible', 'success', 'warning', 'error');

            renderLevelNav();
            saveProgress();
        }

        function highlightSyntax(code) {
            // Usar placeholders para evitar conflitos entre regexes
            const placeholders = [];
            let result = code;

            // 1. Primeiro, proteger strings (para não interferir com HTML depois)
            result = result.replace(/"([^"]*)"/g, (match) => {
                const id = `__STR${placeholders.length}__`;
                placeholders.push({ id, html: `<span class="string">${match}</span>` });
                return id;
            });

            // 2. Proteger comentários
            result = result.replace(/\/\/([^\n]*)/g, (match) => {
                const id = `__CMT${placeholders.length}__`;
                placeholders.push({ id, html: `<span class="comment">${match}</span>` });
                return id;
            });

            // 3. Aplicar highlighting de keywords, types, functions, numbers
            result = result
                .replace(/\b(fn|let|mut|if|else|match|for|while|loop|return|struct|enum|impl|use|in)\b/g, '<span class="keyword">$1</span>')
                .replace(/\b(String|i32|i64|u32|f64|f32|bool|char)\b/g, '<span class="type">$1</span>')
                .replace(/\b(println|print|format|vec)\b!/g, '<span class="function">$1</span>!')
                .replace(/\b(\d+)\b/g, '<span class="number">$1</span>');

            // 4. Restaurar placeholders
            placeholders.forEach(p => {
                result = result.replace(p.id, p.html);
            });

            return result;
        }

        function checkAnswer() {
            const input = document.getElementById('codeInput');
            if (!input) return;

            const ex = currentExercises[currentLevel];
            const userAnswer = input.value.trim();
            const feedbackSection = document.getElementById('feedbackSection');

            // Check for validation pattern (regex) first
            let isCorrect = false;
            if (ex.validationPattern) {
                isCorrect = ex.validationPattern.test(userAnswer);
            }

            // Then check for exact match
            if (!isCorrect) {
                isCorrect = ex.correctAnswers.some(ans =>
                    userAnswer === ans ||
                    userAnswer.toLowerCase() === ans.toLowerCase() ||
                    userAnswer.replace(/\s+/g, ' ').trim() === ans.replace(/\s+/g, ' ').trim()
                );
            }

            // Check for almost correct answers (string match or pattern)
            let almostMatch = null;
            if (!isCorrect && ex.almostCorrect) {
                almostMatch = ex.almostCorrect.find(item => {
                    if (item.almostPattern) {
                        return item.almostPattern.test(userAnswer);
                    }
                    return item.answer && userAnswer.toLowerCase() === item.answer.toLowerCase();
                });
            }

            // Check for semicolon tolerance
            let missingSemicolon = false;
            if (!isCorrect && !almostMatch) {
                const withSemicolon = userAnswer + ';';
                const withoutSemicolon = userAnswer.replace(/;$/, '');

                if (ex.correctAnswers.some(ans => withSemicolon === ans || withoutSemicolon === ans)) {
                    missingSemicolon = true;
                }
            }

            feedbackSection.classList.remove('success', 'warning', 'error');
            feedbackSection.classList.add('visible');

            if (isCorrect || missingSemicolon) {
                input.classList.remove('incorrect');
                input.classList.add('correct');

                if (missingSemicolon) {
                    // Accept but warn
                    feedbackSection.classList.add('warning');
                    document.getElementById('feedbackIcon').textContent = '⚠️';
                    document.getElementById('feedbackTitle').textContent = 'Quase perfeito!';
                    document.getElementById('feedbackText').innerHTML = 'Sua resposta está correta! Na prática, lembre-se que <code>;</code> é importante no final de statements em Rust.';
                } else {
                    feedbackSection.classList.add('success');
                    document.getElementById('feedbackIcon').textContent = '✓';
                    document.getElementById('feedbackTitle').textContent = 'Correto! 🦀';
                    document.getElementById('feedbackText').innerHTML = ex.successMessage;
                }

                if (!completedLevels.has(currentLevel)) {
                    completedLevels.add(currentLevel);
                    streak++;
                }
                updateStats();
                renderLevelNav();
                saveProgress();

                setTimeout(() => {
                    showSuccessModal();
                }, 1500);

            } else if (almostMatch) {
                input.classList.add('incorrect');
                feedbackSection.classList.add('warning');
                document.getElementById('feedbackIcon').textContent = '💡';
                document.getElementById('feedbackTitle').textContent = 'Quase lá!';
                document.getElementById('feedbackText').innerHTML = almostMatch.feedback;

                setTimeout(() => input.classList.remove('incorrect'), 400);

            } else {
                input.classList.add('incorrect');
                feedbackSection.classList.add('error');
                document.getElementById('feedbackIcon').textContent = '✗';
                document.getElementById('feedbackTitle').textContent = 'Tente novamente';

                // Smart error detection
                let errorFeedback = getSmartFeedback(userAnswer, ex);
                document.getElementById('feedbackText').innerHTML = errorFeedback;

                setTimeout(() => input.classList.remove('incorrect'), 400);
            }
        }

        function getSmartFeedback(userAnswer, exercise) {
            const answer = userAnswer.trim();

            // Empty answer
            if (!answer) {
                return 'Digite sua resposta no campo acima.';
            }

            // Common mistakes detection
            const commonErrors = [
                { pattern: /^console\.log/, feedback: 'Isso é JavaScript! Em Rust, use <code>println!</code>' },
                { pattern: /^print\s*\([^)]*\)\s*;?$/, feedback: 'Faltou o <code>!</code> - em Rust é <code>println!</code> (macro)' },
                { pattern: /^println\s*\([^)]*\)\s*;?$/, feedback: 'Faltou o <code>!</code> após println - é <code>println!</code>' },
                { pattern: /^printf\s*\(/, feedback: 'Isso é C! Em Rust, use <code>println!</code>' },
                { pattern: /^puts\s+/, feedback: 'Isso é Ruby! Em Rust, use <code>println!</code>' },
                { pattern: /^echo\s+/, feedback: 'Isso é shell! Em Rust, use <code>println!</code>' },
                { pattern: /^var\s+/, feedback: 'Rust usa <code>let</code>, não <code>var</code>' },
                { pattern: /^int\s+\w+/, feedback: 'Rust usa <code>let nome: i32</code>, não <code>int nome</code>' },
                { pattern: /^function\s+/, feedback: 'Rust usa <code>fn</code>, não <code>function</code>' },
                { pattern: /^def\s+/, feedback: 'Isso é Python! Em Rust, use <code>fn</code>' },
                { pattern: /^void\s+/, feedback: 'Isso é C/C++! Em Rust, funções sem retorno usam <code>fn nome()</code>' },
                { pattern: /:\s*int\b/, feedback: 'O tipo inteiro em Rust é <code>i32</code>, não <code>int</code>' },
                { pattern: /:\s*string\b/i, feedback: 'O tipo é <code>String</code> (com S maiúsculo) ou <code>&str</code>' },
                { pattern: /=>\s*$/, feedback: 'Em match, use <code>=></code> seguido da expressão. Ex: <code>1 => "um"</code>' },
                { pattern: /->$/, feedback: 'Após <code>-></code> especifique o tipo de retorno. Ex: <code>-> i32</code>' },
                { pattern: /\bNULL\b|\bnull\b/, feedback: 'Rust não tem null! Use <code>None</code> com <code>Option</code>' },
                { pattern: /\btrue\b.*\bfalse\b|\bfalse\b.*\btrue\b/i, feedback: 'Booleanos em Rust são <code>true</code> e <code>false</code> (minúsculas)' },
                { pattern: /\bTrue\b|\bFalse\b/, feedback: 'Booleanos em Rust são minúsculos: <code>true</code> e <code>false</code>' },
                { pattern: /['"][^'"]*['"].*['"][^'"]*['"]/, feedback: 'Strings em Rust usam aspas duplas <code>"texto"</code>. Aspas simples são para <code>char</code>.' },
                { pattern: /^'[^']*'$/, feedback: 'Use aspas duplas <code>"..."</code> para strings. Aspas simples são para caracteres.' }
            ];

            for (const err of commonErrors) {
                if (err.pattern.test(answer)) {
                    return err.feedback;
                }
            }

            // Check if close to correct answer
            if (exercise.correctAnswers && exercise.correctAnswers.length > 0) {
                const firstCorrect = exercise.correctAnswers[0];

                // Check for case sensitivity issues
                if (exercise.correctAnswers.some(ans => ans.toLowerCase() === answer.toLowerCase() && ans !== answer)) {
                    return 'Quase! Verifique maiúsculas e minúsculas.';
                }

                // Check for extra/missing spaces
                const normalizedAnswer = answer.replace(/\s+/g, '');
                if (exercise.correctAnswers.some(ans => ans.replace(/\s+/g, '') === normalizedAnswer)) {
                    return 'Quase! Verifique os espaços na sua resposta.';
                }
            }

            // Default feedback with hint to use hints
            return 'Sua resposta não está correta. Use as dicas se precisar de ajuda!';
        }

                            🚀 Modo Avançado
                        </button>
                        <a href="game-advanced.html" style="
                            padding: 1rem 2rem;
                            font-size: 1.1rem;
                            background: linear-gradient(135deg, #9333ea, #db2777);
                            color: white;
                            border: none;
                            border-radius: 12px;
                            cursor: pointer;
                            font-weight: bold;
                            transition: all 0.3s ease;
                            text-decoration: none;
                        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                            ⚔️ Rust Arena
                        </a>
                        <button onclick="closeAdvancedModal()" style="
                            padding: 1rem 2rem;
                            font-size: 1.1rem;
                            background: rgba(255,255,255,0.1);
                            color: #ccc;
                            border: 1px solid rgba(255,255,255,0.2);
                            border-radius: 12px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                        " onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
                            Continuar Praticando
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function switchToAdvancedMode() {
            // Fechar modal e trocar para modo avançado
            const modal = document.getElementById('advancedSuggestionModal');
            if (modal) modal.remove();

            gameMode = 'normal';
            currentExercises = exercises;
            currentLevel = 0;
            completedLevels = new Set();
            streak = 0;
            saveProgress();
            updateModeIndicator();
            loadLevel(0);
        }

        function closeAdvancedModal() {
            const modal = document.getElementById('advancedSuggestionModal');
            if (modal) modal.classList.remove('visible');
            setTimeout(() => modal && modal.remove(), 300);
        }

        function nextLevel() {
            document.getElementById('successModal').classList.remove('visible');
            if (currentLevel < currentExercises.length - 1) {
                loadLevel(currentLevel + 1);
            }
        }

        function resetLevel() {
            loadLevel(currentLevel);
        }

        function resetMode() {
            if (confirm('Deseja trocar de modo? Seu progresso atual será perdido.')) {
                gameMode = null;
                currentLevel = 0;
                completedLevels = new Set();
                streak = 0;
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('welcomeModal').classList.add('visible');
            }
        }

        function updateModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            if (gameMode === 'beginner') {
                indicator.textContent = '🌱 Iniciante';
                indicator.className = 'mode-indicator beginner';
            } else if (gameMode === 'normal') {
                indicator.textContent = '💻 Normal';
                indicator.className = 'mode-indicator normal';
            }
        }

        init();

        // ============================================
        // PROTEÇÃO ANTI-DEVTOOLS (INBURLÁVEL)
        // ============================================

        (function() {
            const blockOverlay = document.createElement('div');
            blockOverlay.id = 'devtools-block';
            blockOverlay.innerHTML = `
                <div style="text-align:center;padding:2rem;">
                    <div style="font-size:4rem;margin-bottom:1rem;">🚫</div>
                    <h1 style="color:#F74C00;margin-bottom:1rem;">Acesso Bloqueado</h1>
                    <p style="color:#999;max-width:400px;margin:0 auto;">
                        DevTools detectado. Feche as ferramentas de desenvolvedor e recarregue a página para continuar jogando.
                    </p>
                    <button onclick="location.reload()" style="margin-top:2rem;padding:1rem 2rem;background:#F74C00;color:white;border:none;border-radius:8px;cursor:pointer;font-size:1rem;">
                        Recarregar Página
                    </button>
                </div>
            `;
            blockOverlay.style.cssText = `
                display:none;position:fixed;inset:0;background:#1a1a1a;
                z-index:999999;justify-content:center;align-items:center;
                font-family:Inter,sans-serif;
            `;
            document.body.appendChild(blockOverlay);

            let isBlocked = false;

            function blockGame() {
                if (!isBlocked) {
                    isBlocked = true;
                    blockOverlay.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }
            }

            // 1. Bloquear atalhos de teclado
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.key === 'F12' || e.keyCode === 123) {
                    e.preventDefault();
                    blockGame();
                    return false;
                }
                // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
                if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) {
                    e.preventDefault();
                    blockGame();
                    return false;
                }
                // Ctrl+U (view source)
                if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                    e.preventDefault();
                    blockGame();
                    return false;
                }
                // Cmd+Option+I (Mac)
                if (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'i')) {
                    e.preventDefault();
                    blockGame();
                    return false;
                }
            }, true);

            // 2. Bloquear clique direito em toda página
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            }, true);

            // 3. Detectar DevTools por tamanho da janela
            const threshold = 160;
            let lastCheck = Date.now();

            function checkDevTools() {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;

                if (widthThreshold || heightThreshold) {
                    blockGame();
                }
            }

            // 4. Detectar DevTools por debugger timing
            function checkDebugger() {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if (end - start > 100) {
                    blockGame();
                }
            }

            // 5. Detectar se console está aberto via toString
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    blockGame();
                    return '';
                }
            });

            // 6. Verificações contínuas
            setInterval(function() {
                checkDevTools();
                // Console check silencioso
                console.log('%c', element);
                console.clear();
            }, 1000);

            // 7. Verificar ao redimensionar
            window.addEventListener('resize', checkDevTools);

            // 8. Desabilitar arrastar elementos
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });

            // 9. Bloquear seleção global (exceto input)
            document.addEventListener('selectstart', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    return false;
                }
            });

            // 10. Verificação inicial
            checkDevTools();
        })();
    </script>
</body>
</html>
