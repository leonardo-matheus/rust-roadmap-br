<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Rust Arena - Desafios de Programação</title>
    <meta name="description" content="Resolva desafios de programação em Rust com compilação real.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="theme-color" content="#F74C00">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <style>
        :root {
            --rust-primary: #B7410E;
            --rust-light: #CE5A24;
            --ferris-orange: #F74C00;
            --ferris-light: #FF6B2B;
            --bg-dark: #1a1a1a;
            --bg-medium: #242424;
            --bg-light: #2e2e2e;
            --bg-code: #0d0d0d;
            --text-primary: #F5F5F5;
            --text-secondary: #B0B0B0;
            --text-muted: #707070;
            --success: #4EC9B0;
            --error: #F14C4C;
            --warning: #CCA700;
            --info: #3794FF;
            --border: #3a3a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: rgba(36, 36, 36, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo img { width: 32px; height: 32px; }
        .logo span { color: var(--ferris-orange); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .difficulty-badge {
            background: linear-gradient(135deg, #9333ea, #db2777);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-back {
            background: var(--bg-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-back:hover {
            border-color: var(--ferris-orange);
            color: var(--text-primary);
        }

        /* Main Layout */
        .arena-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: calc(100vh - 57px);
        }

        /* Problem Panel */
        .problem-panel {
            background: var(--bg-medium);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .problem-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .problem-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .problem-nav button {
            background: var(--bg-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .problem-nav button:hover {
            border-color: var(--ferris-orange);
            color: var(--text-primary);
        }

        .problem-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .problem-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .problem-number {
            background: linear-gradient(135deg, var(--rust-primary), var(--ferris-orange));
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .problem-title h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .problem-category {
            font-size: 0.7rem;
            color: var(--ferris-orange);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .problem-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .problem-section {
            margin-bottom: 1.5rem;
        }

        .problem-section h3 {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .problem-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .problem-description code {
            background: var(--bg-code);
            color: var(--ferris-orange);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .example-box {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .example-header {
            background: var(--bg-light);
            padding: 0.4rem 0.75rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .example-content {
            padding: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--success);
            white-space: pre-wrap;
        }

        .constraints {
            background: rgba(55, 148, 255, 0.1);
            border: 1px solid rgba(55, 148, 255, 0.2);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .constraints ul {
            list-style: none;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .constraints li {
            padding: 0.25rem 0;
            padding-left: 1.25rem;
            position: relative;
        }

        .constraints li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--info);
        }

        /* Editor Panel */
        .editor-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-code);
        }

        .editor-header {
            background: var(--bg-medium);
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .editor-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .editor-tab {
            background: var(--bg-code);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 1rem;
            border-radius: 6px 6px 0 0;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .editor-tab.active {
            background: var(--bg-code);
            border-bottom-color: var(--bg-code);
            color: var(--text-primary);
        }

        .editor-tab .dot {
            width: 8px;
            height: 8px;
            background: var(--ferris-orange);
            border-radius: 50%;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-run {
            background: linear-gradient(135deg, var(--success), #059669);
            border: none;
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-run:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(78, 201, 176, 0.3);
        }

        .btn-run:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--ferris-orange), var(--rust-primary));
            border: none;
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(247, 76, 0, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: var(--bg-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .editor-container {
            flex: 1;
            overflow: hidden;
        }

        .CodeMirror {
            height: 100%;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Output Panel */
        .output-panel {
            background: var(--bg-medium);
            border-top: 1px solid var(--border);
            height: 200px;
            display: flex;
            flex-direction: column;
        }

        .output-header {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-tabs {
            display: flex;
            gap: 1rem;
        }

        .output-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.25rem 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .output-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--ferris-orange);
        }

        .output-status {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-success { color: var(--success); }
        .status-error { color: var(--error); }
        .status-running { color: var(--warning); }

        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .output-content.error {
            color: var(--error);
        }

        .output-content.success {
            color: var(--success);
        }

        /* Success Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: var(--bg-medium);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .modal-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, var(--ferris-orange), var(--rust-primary));
            border: none;
            color: white;
        }

        .modal-btn-secondary {
            background: var(--bg-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ferris-orange); }

        /* Mobile */
        @media (max-width: 900px) {
            .arena-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .problem-panel {
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .editor-panel {
                height: 60vh;
            }

            .output-panel {
                height: 150px;
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 0.5rem 1rem;
            }

            .problem-header {
                padding: 1rem;
            }

            .problem-content {
                padding: 1rem;
            }

            .editor-header {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .editor-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="game.html" class="logo">
            <img src="logo.png" alt="Rust Logo">
            Rust <span>Arena</span>
        </a>
        <div class="header-actions">
            <span class="difficulty-badge">Modo Avançado</span>
            <a href="game.html" class="btn-back">← Voltar ao Jogo</a>
        </div>
    </header>

    <div class="arena-layout">
        <!-- Problem Panel -->
        <div class="problem-panel">
            <div class="problem-header">
                <div class="problem-nav">
                    <button onclick="prevProblem()" id="prevBtn">← Anterior</button>
                    <button onclick="nextProblem()" id="nextBtn">Próximo →</button>
                </div>
                <div class="problem-title">
                    <div class="problem-number" id="problemNumber">1</div>
                    <div>
                        <h2 id="problemTitle">Carregando...</h2>
                        <div class="problem-category" id="problemCategory">-</div>
                    </div>
                </div>
            </div>
            <div class="problem-content">
                <div class="problem-section">
                    <h3>Descrição</h3>
                    <div class="problem-description" id="problemDescription"></div>
                </div>
                <div class="problem-section">
                    <h3>Exemplo</h3>
                    <div class="example-box">
                        <div class="example-header">Saída Esperada</div>
                        <div class="example-content" id="expectedOutput"></div>
                    </div>
                </div>
                <div class="problem-section" id="constraintsSection">
                    <h3>Restrições</h3>
                    <div class="constraints">
                        <ul id="constraintsList"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor Panel -->
        <div class="editor-panel">
            <div class="editor-header">
                <div class="editor-tabs">
                    <div class="editor-tab active">
                        <span class="dot"></span>
                        main.rs
                    </div>
                </div>
                <div class="editor-actions">
                    <button class="btn-reset" onclick="resetCode()">Resetar</button>
                    <button class="btn-run" onclick="runCode()" id="runBtn">
                        ▶ Executar
                    </button>
                    <button class="btn-submit" onclick="submitCode()" id="submitBtn">
                        ✓ Submeter
                    </button>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="codeEditor"></textarea>
            </div>
            <div class="output-panel">
                <div class="output-header">
                    <div class="output-tabs">
                        <button class="output-tab active" onclick="showTab('output')">Saída</button>
                        <button class="output-tab" onclick="showTab('errors')">Erros</button>
                    </div>
                    <div class="output-status" id="outputStatus"></div>
                </div>
                <div class="output-content" id="outputContent">
                    Clique em "Executar" para compilar e rodar seu código.
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <h2 class="modal-title">Desafio Concluído!</h2>
            <p class="modal-text" id="modalText">Parabéns! Seu código passou em todos os testes.</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Revisar Código</button>
                <button class="modal-btn modal-btn-primary" onclick="nextProblem(); closeModal();">Próximo Desafio →</button>
            </div>
        </div>
    </div>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

Calcule e imprima a soma de todos os elementos.`,
                expectedOutput: "15",
                constraints: [
                    "Use vec! ou Vec::new()",
                    "Use iteração para somar"
                ],

}`
            },
            {
                id: 9,
                title: "Ownership Challenge",
                category: "Ownership",
                description: `Crie uma String <code>"Rust"</code>, passe ela para uma função que adiciona <code>" é incrível!"</code> e retorna a String modificada.

Imprima o resultado: <code>Rust é incrível!</code>`,
                expectedOutput: "Rust é incrível!",
                constraints: [
                    "Demonstre ownership passando a String para função",
                    "A função deve retornar a String modificada"
                ],
                starterCode: `fn adicionar_texto(mut s: String) -> String {
    // Adicione " é incrível!" à string

}

fn main() {
    let texto = String::from("Rust");

    // Chame a função e imprima

}`
            },
            {
                id: 10,
                title: "Match com Enum",
                category: "Enums",
                description: `Crie um enum <code>Comando</code> com variantes <code>Iniciar</code>, <code>Parar</code> e <code>Pausar</code>.

Use match para imprimir a ação correspondente ao comando <code>Iniciar</code>:
<code>Sistema iniciado</code>`,
                expectedOutput: "Sistema iniciado",
                constraints: [
                    "Defina o enum com 3 variantes",
                    "Use match para pattern matching"
                ],
                starterCode: `// Defina o enum Comando


fn executar(cmd: Comando) {
    // Use match para executar o comando

}

fn main() {
    let cmd = Comando::Iniciar;
    executar(cmd);
}`
            }
        ];

        // ============================================
        // ESTADO DO JOGO
        // ============================================
        let currentProblem = 0;
        let editor;
        let completedProblems = new Set();

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        function init() {
            // Inicializar CodeMirror
            editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                mode: 'rust',
                theme: 'material-darker',
                lineNumbers: true,
                matchBrackets: true,
                autoCloseBrackets: true,
                indentUnit: 4,
                tabSize: 4,
                indentWithTabs: false,
                lineWrapping: true,
                extraKeys: {
                    "Ctrl-Enter": runCode,
                    "Cmd-Enter": runCode
                }
            });

            // Carregar progresso
            const saved = localStorage.getItem('rust-arena-progress');
            if (saved) {
                completedProblems = new Set(JSON.parse(saved));
            }

            loadProblem(currentProblem);
        }

        // ============================================
        // CARREGAR PROBLEMA
        // ============================================
        function loadProblem(index) {
            const problem = problems[index];

            document.getElementById('problemNumber').textContent = problem.id;
            document.getElementById('problemTitle').textContent = problem.title;
            document.getElementById('problemCategory').textContent = problem.category;
            document.getElementById('problemDescription').innerHTML = problem.description.replace(/\n/g, '<br>');
            document.getElementById('expectedOutput').textContent = problem.expectedOutput;

            // Constraints
            const constraintsList = document.getElementById('constraintsList');
            constraintsList.innerHTML = problem.constraints.map(c => `<li>${c}</li>`).join('');

            // Editor
            editor.setValue(problem.starterCode);

            // Navigation
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === problems.length - 1;

            // Reset output
            document.getElementById('outputContent').textContent = 'Clique em "Executar" para compilar e rodar seu código.';
            document.getElementById('outputContent').className = 'output-content';
            document.getElementById('outputStatus').innerHTML = '';
        }

        function nextProblem() {
            if (currentProblem < problems.length - 1) {
                currentProblem++;
                loadProblem(currentProblem);
            }
        }

        function prevProblem() {
            if (currentProblem > 0) {
                currentProblem--;
                loadProblem(currentProblem);
            }
        }

        function resetCode() {
            const problem = problems[currentProblem];
            editor.setValue(problem.starterCode);
        }

        // ============================================
        // COMPILAR E EXECUTAR (via Rust Playground API)
        // ============================================
        async function runCode() {
            const code = editor.getValue();
            const runBtn = document.getElementById('runBtn');
            const outputContent = document.getElementById('outputContent');
            const outputStatus = document.getElementById('outputStatus');

            // UI: Loading
            runBtn.disabled = true;
            runBtn.innerHTML = '<span class="spinner"></span> Compilando...';
            outputStatus.innerHTML = '<span class="status-running">● Compilando...</span>';
            outputContent.textContent = 'Aguarde...';
            outputContent.className = 'output-content';

            try {
                const response = await fetch('https://play.rust-lang.org/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        channel: 'stable',
                        mode: 'debug',
                        edition: '2021',
                        crateType: 'bin',
                        tests: false,
                        code: code,
                        backtrace: false
                    })
                });

                const result = await response.json();

                if (result.success) {
                    outputContent.textContent = result.stdout || '(sem saída)';
                    outputContent.className = 'output-content success';
                    outputStatus.innerHTML = '<span class="status-success">● Sucesso</span>';
                } else {
                    outputContent.textContent = result.stderr || 'Erro desconhecido';
                    outputContent.className = 'output-content error';
                    outputStatus.innerHTML = '<span class="status-error">● Erro de compilação</span>';
                }

                return result;
            } catch (error) {
                outputContent.textContent = 'Erro ao conectar com o servidor. Verifique sua conexão.';
                outputContent.className = 'output-content error';
                outputStatus.innerHTML = '<span class="status-error">● Erro de conexão</span>';
                return null;
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '▶ Executar';
            }
        }

        // ============================================
        // SUBMETER SOLUÇÃO
        // ============================================
        async function submitCode() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Verificando...';

            const result = await runCode();

            if (result && result.success) {
                const problem = problems[currentProblem];
                const output = (result.stdout || '').trim();
                const expected = problem.expectedOutput.trim();

                if (output === expected) {
                    // Sucesso!
                    completedProblems.add(problem.id);
                    localStorage.setItem('rust-arena-progress', JSON.stringify([...completedProblems]));

                    document.getElementById('successModal').classList.add('visible');
                } else {
                    document.getElementById('outputContent').textContent =
                        `❌ Saída incorreta!\n\nEsperado:\n${expected}\n\nRecebido:\n${output}`;
                    document.getElementById('outputContent').className = 'output-content error';
                    document.getElementById('outputStatus').innerHTML = '<span class="status-error">● Saída incorreta</span>';
                }
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = '✓ Submeter';
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('visible');
        }

        function showTab(tab) {
            // Simplificado - apenas uma aba por enquanto
            document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Iniciar
        init();
    </script>
</body>
</html>
