<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Assistant | Seu Tutor de Rust com IA</title>
    <meta name="description" content="Assistente de IA especializado em Rust para tirar suas dúvidas.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="theme-color" content="#F74C00">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        :root {
            --rust-orange: #F74C00;
            --rust-orange-light: #FF6B2C;
            --rust-dark: #0a0a0a;
            --rust-darker: #050505;
            --rust-light: #fafafa;
            --rust-gray: #18181b;
            --rust-gray-light: #27272a;
            --rust-border: #3f3f46;
            --gradient-1: linear-gradient(135deg, #F74C00 0%, #FF8C42 100%);
            --success: #22c55e;
            --info: #3b82f6;
            --glass: rgba(24, 24, 27, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--rust-darker);
            color: var(--rust-light);
            line-height: 1.6;
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        /* Header */
        header {
            background: var(--rust-dark);
            border-bottom: 1px solid var(--rust-border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--rust-light);
        }

        .logo img {
            width: 40px;
            height: 40px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .logo-text span {
            color: var(--rust-orange);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-header {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--rust-border);
            color: var(--rust-light);
        }

        .btn-outline:hover {
            border-color: var(--rust-orange);
            background: rgba(247, 76, 0, 0.1);
        }

        .btn-primary-sm {
            background: var(--gradient-1);
            border: none;
            color: white;
        }

        .btn-primary-sm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(247, 76, 0, 0.4);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 3rem 1rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .welcome-message h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome-message p {
            color: #71717a;
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 1.5rem;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .suggestion-btn {
            background: var(--rust-gray);
            border: 1px solid var(--rust-border);
            color: #a1a1aa;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .suggestion-btn:hover {
            border-color: var(--rust-orange);
            color: var(--rust-light);
            background: rgba(247, 76, 0, 0.1);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 1rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .message.assistant .avatar {
            background: var(--gradient-1);
        }

        .message.user .avatar {
            background: var(--rust-gray-light);
            border: 1px solid var(--rust-border);
        }

        .message-content {
            max-width: 75%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .message.user .message-content {
            background: var(--rust-orange);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--rust-gray);
            border: 1px solid var(--rust-border);
            border-bottom-left-radius: 4px;
        }

        .message-content p {
            margin-bottom: 0.75rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            color: var(--rust-orange-light);
            font-weight: 600;
        }

        .message.user .message-content strong {
            color: white;
        }

        /* Code in messages */
        .message-content pre {
            background: #0d0d0d;
            border-radius: 8px;
            padding: 1rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            border: 1px solid var(--rust-border);
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .message-content :not(pre) > code {
            background: rgba(247, 76, 0, 0.15);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            color: var(--rust-orange-light);
        }

        .message.user .message-content :not(pre) > code {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--rust-orange);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: var(--rust-dark);
            border-top: 1px solid var(--rust-border);
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            background: var(--rust-gray);
            border: 1px solid var(--rust-border);
            border-radius: 16px;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--rust-orange);
            box-shadow: 0 0 0 3px rgba(247, 76, 0, 0.1);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--rust-light);
            font-family: inherit;
            font-size: 1rem;
            padding: 0.75rem;
            resize: none;
            min-height: 24px;
            max-height: 150px;
            outline: none;
        }

        #messageInput::placeholder {
            color: #52525b;
        }

        .send-btn {
            background: var(--gradient-1);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(247, 76, 0, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--rust-gray-light);
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: var(--rust-orange);
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Mobile Responsive - Tablet */
        @media (max-width: 768px) {
            header {
                padding: 0.75rem 1rem;
            }

            .logo-text {
                font-size: 1rem;
            }

            .header-actions .btn-header span {
                display: none;
            }

            .messages-area {
                padding: 1rem;
                gap: 1rem;
            }

            .message-content {
                max-width: 88%;
                padding: 0.875rem 1rem;
                font-size: 0.9rem;
            }

            .message-content pre {
                padding: 0.75rem;
                font-size: 0.8rem;
            }

            .welcome-message {
                padding: 2rem 1rem;
            }

            .welcome-icon {
                font-size: 3rem;
            }

            .welcome-message h2 {
                font-size: 1.5rem;
            }

            .welcome-message p {
                font-size: 0.9rem;
            }

            .suggestions {
                gap: 0.4rem;
            }

            .suggestion-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .input-area {
                padding: 0.75rem 1rem 1rem;
            }

            .input-wrapper {
                padding: 0.4rem;
            }

            #messageInput {
                font-size: 0.95rem;
                padding: 0.6rem;
            }

            .send-btn {
                width: 44px;
                height: 44px;
            }

            .avatar {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }
        }

        /* Mobile Responsive - Phone */
        @media (max-width: 480px) {
            header {
                padding: 0.6rem 0.75rem;
            }

            .logo img {
                width: 32px;
                height: 32px;
            }

            .logo-text {
                font-size: 0.9rem;
            }

            .header-actions {
                gap: 0.5rem;
            }

            .btn-header {
                padding: 0.4rem 0.6rem;
                font-size: 0.75rem;
            }

            .messages-area {
                padding: 0.75rem;
                gap: 0.875rem;
            }

            .message {
                gap: 0.6rem;
            }

            .message-content {
                max-width: 92%;
                padding: 0.75rem 0.875rem;
                font-size: 0.85rem;
                border-radius: 12px;
            }

            .message.user .message-content {
                border-bottom-right-radius: 4px;
            }

            .message.assistant .message-content {
                border-bottom-left-radius: 4px;
            }

            .message-content pre {
                padding: 0.6rem;
                margin: 0.5rem 0;
                font-size: 0.75rem;
                border-radius: 6px;
            }

            .message-content code {
                font-size: 0.75rem;
            }

            .message-content :not(pre) > code {
                padding: 0.1rem 0.3rem;
            }

            .avatar {
                width: 28px;
                height: 28px;
                font-size: 1rem;
                border-radius: 8px;
            }

            .welcome-message {
                padding: 1.5rem 0.75rem;
            }

            .welcome-icon {
                font-size: 2.5rem;
                margin-bottom: 0.75rem;
            }

            .welcome-message h2 {
                font-size: 1.25rem;
                margin-bottom: 0.4rem;
            }

            .welcome-message p {
                font-size: 0.85rem;
                line-height: 1.5;
            }

            .suggestions {
                gap: 0.35rem;
                margin-top: 0.75rem;
            }

            .suggestion-btn {
                padding: 0.35rem 0.7rem;
                font-size: 0.75rem;
                border-radius: 16px;
            }

            .input-area {
                padding: 0.6rem 0.75rem 0.875rem;
            }

            .input-wrapper {
                padding: 0.35rem;
                border-radius: 12px;
            }

            #messageInput {
                font-size: 0.9rem;
                padding: 0.5rem;
            }

            #messageInput::placeholder {
                font-size: 0.85rem;
            }

            .send-btn {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                font-size: 1.1rem;
            }

            .error-message {
                padding: 0.75rem;
                font-size: 0.8rem;
                border-radius: 10px;
            }

            .typing-indicator span {
                width: 6px;
                height: 6px;
            }
        }

        /* Extra small devices */
        @media (max-width: 360px) {
            .message-content {
                max-width: 95%;
            }

            .welcome-message h2 {
                font-size: 1.1rem;
            }

            .suggestion-btn {
                font-size: 0.7rem;
                padding: 0.3rem 0.6rem;
            }
        }

        /* Safe area for notched phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            .input-area {
                padding-bottom: calc(0.875rem + env(safe-area-inset-bottom));
            }
        }

        /* Prevent zoom on input focus (iOS) */
        @media (max-width: 768px) {
            #messageInput {
                font-size: 16px; /* Prevents iOS zoom */
            }
        }

        /* Lists in messages */
        .message-content ul, .message-content ol {
            margin: 0.75rem 0 0.75rem 1.25rem;
        }

        .message-content li {
            margin-bottom: 0.25rem;
        }

        .message-content li::marker {
            color: var(--rust-orange);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Rust Logo">
            <span class="logo-text">Rust <span>Assistant</span></span>
        </a>
        <div class="header-actions">
            <a href="index.html" class="btn-header btn-outline">
                <span>Roadmap</span>
            </a>
            <a href="game.html" class="btn-header btn-primary-sm">
                <span>Jogar</span>
            </a>
        </div>
    </header>

    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-icon">🦀</div>
                <h2>Rust Assistant</h2>
                <p>Sou seu tutor especializado em Rust. Tire dúvidas sobre sintaxe, ownership, borrowing, traits e muito mais!</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion('O que é ownership em Rust?')">O que é ownership?</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Explique borrowing e referências')">Borrowing e referências</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Como usar Result e Option?')">Result e Option</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Me dê um exemplo de struct com impl')">Structs e métodos</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Pergunte algo sobre Rust..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const API_URL = 'https://claudioai.dev/v1/messages';
        // 🎁 Parabéns por explorar o código! Esta API é cortesia do projeto.
        // Uso monitorado - abuse e será revogada. Divirta-se aprendendo Rust! 🦀
        //
        // 🚀 Conheça o ClaudioAI: https://claudioai.dev
        // Em breve: mais modelos, novas funcionalidades e muito mais!
        const API_KEY = 'sk-claudio-03de55fde78bb61e0b78f3220e1e1a24d3de9a428e89ebaa';

        const SYSTEM_PROMPT = `Você é o Rust Assistant, um tutor especializado e apaixonado pela linguagem Rust. Seu objetivo é ajudar desenvolvedores brasileiros a aprenderem Rust de forma clara e didática.

## Suas características:
- Responde SEMPRE em português brasileiro
- Usa exemplos de código práticos e bem comentados
- Explica conceitos complexos de forma simples e acessível
- É paciente e encoraja o aprendizado
- Menciona boas práticas e padrões idiomáticos do Rust
- Quando relevante, compara com outras linguagens para facilitar o entendimento

## Ao explicar código:
- Use blocos de código com a linguagem especificada (\`\`\`rust)
- Adicione comentários explicativos no código
- Mostre exemplos que compilam e funcionam
- Aponte erros comuns e como evitá-los

## Tópicos que você domina:
- Ownership, borrowing e lifetimes
- Traits e generics
- Pattern matching e enums
- Error handling (Result, Option)
- Structs e implementações
- Concorrência segura
- Async/await e Tokio
- Cargo e ecossistema de crates
- WebAssembly com Rust
- Sistemas embarcados

Seja amigável, use emojis ocasionalmente para tornar a conversa mais leve, e sempre incentive o usuário a continuar aprendendo!`;

        let conversationHistory = [];
        let isLoading = false;

        // Auto-resize textarea
        const messageInput = document.getElementById('messageInput');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendSuggestion(text) {
            messageInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = messageInput.value.trim();
            if (!input || isLoading) return;

            // Hide welcome message
            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) {
                welcomeMsg.style.display = 'none';
            }

            // Add user message
            addMessage('user', input);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Add to history
            conversationHistory.push({ role: 'user', content: input });

            // Show loading
            isLoading = true;
            updateSendButton();
            const loadingDiv = addLoadingIndicator();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-5',
                        max_tokens: 4096,
                        system: SYSTEM_PROMPT,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erro na API: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;

                // Remove loading
                loadingDiv.remove();

                // Add assistant message
                addMessage('assistant', assistantMessage);

                // Add to history
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                console.error('Erro:', error);
                loadingDiv.remove();
                addErrorMessage('Desculpe, ocorreu um erro ao processar sua mensagem. Tente novamente.');
            } finally {
                isLoading = false;
                updateSendButton();
            }
        }

        function addMessage(role, content) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'assistant' ? '🦀' : '👤';

            // Parse markdown for assistant messages
            let formattedContent = content;
            if (role === 'assistant') {
                formattedContent = marked.parse(content);
            } else {
                formattedContent = escapeHtml(content).replace(/\n/g, '<br>');
            }

            messageDiv.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="message-content">${formattedContent}</div>
            `;

            messagesArea.appendChild(messageDiv);

            // Highlight code blocks
            messageDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            scrollToBottom();
        }

        function addLoadingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="avatar">🦀</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesArea.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv;
        }

        function addErrorMessage(text) {
            const messagesArea = document.getElementById('messagesArea');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = text;
            messagesArea.appendChild(errorDiv);
            scrollToBottom();
        }

        function updateSendButton() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = isLoading;
        }

        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return code;
            },
            breaks: true
        });
    </script>
</body>
</html>
